name = "mg-share"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Googleログイン用：OAuthクライアントID（公開値）。Google Cloud で作成して貼る
# セッション署名鍵は秘密： wrangler secret put SESSION_SECRET
[vars]
GOOGLE_CLIENT_ID = "177151250196-ta2k23m2fe1ac9bras75ajk6ia79h88k.apps.googleusercontent.com"
# Cloudflare Stream（確認用動画の自動トランスコード）。トークンは秘密： wrangler secret put STREAM_API_TOKEN
STREAM_ACCOUNT_ID = "fa27b051015cf14d2a1af3acc35c4d0f"

# 共有スナップショット＋コメント保存用 KV
# 初回: wrangler kv namespace create SNAPS で id を発行して下記に貼る
[[kv_namespaces]]
binding = "SNAPS"
id = "dae9e99997cc4ad29722f28f4c23476f"

# 大容量ファイル転送＋動画レビュー用 R2
# 初回: npx wrangler r2 bucket create mg-files
[[r2_buckets]]
binding = "FILES"
bucket_name = "mg-files"

# 期限切れファイルの自動削除（毎日 UTC18:00 = JST3:00）
[triggers]
crons = ["0 18 * * *"]

# Flip-LAB（第二の脳）への直結。編集ルールをチャンネル別に取得して編集者に表示。
# worker間fetchはworkers.dev公開URLだと1042で弾かれるためService Bindingで直結。
# 認証トークンは秘密： wrangler secret put FLIP_LAB_TOKEN
[[services]]
binding = "LAB"
service = "flip-lens"

# Flip Board(案件台帳D1)の日程を読むための直結。birdflip-cron が D1 を持ち /api/case-schedule を返す。
# worker間fetchは公開URLだと1042で弾かれるためService Bindingで直結。認証は MG_LIST_KEY(secret)。
[[services]]
binding = "CRON"
service = "birdflip-cron"

# リアルタイム共同編集（共有リンクの編集モード）。SQLite-backed=無料プラン枠
[[durable_objects.bindings]]
name = "LIVEDOC"
class_name = "LiveDoc"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveDoc"]
