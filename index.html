<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ものがたりっち！ — 一日密着 構成脚本ツール</title>
<meta name="theme-color" content="#E9E8E3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<script>
if (typeof window.storage === "undefined") {
  window.storage = {
    async get(key){const v=localStorage.getItem("mg:"+key);if(v===null)throw new Error("nf");return {key,value:v,shared:false};},
    async set(key,value){localStorage.setItem("mg:"+key,value);return {key,value,shared:false};},
    async delete(key){localStorage.removeItem("mg:"+key);return {key,deleted:true,shared:false};},
    async list(prefix){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("mg:"+(prefix||"")))keys.push(k.slice(3));}return {keys,prefix,shared:false};},
  };
}
</script>
<!-- スクロール時に上部へ白い隙間が出る問題の対策：地色を本体背景に合わせ、オーバースクロールを抑制 -->
<style>html,body{margin:0;padding:0;background:#E9E8E3;overscroll-behavior:none}</style>
</head>
<body>
<div id="root"></div>
<script src="app.js" defer></script>

<script>
if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
