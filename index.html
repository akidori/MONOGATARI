<!-- Googleログイン（任意・クラウド同期用）。下のIDは Google Cloud の OAuth クライアントID を貼る -->

<!-- 住所オートコンプリート用：Google Maps JavaScript API キー（Places有効化＋請求設定が必要） -->
<script>window.MG_GMAPS_KEY = "REPLACE_WITH_YOUR_GOOGLE_MAPS_API_KEY";</script>
<script>
if (typeof window.storage === "undefined") {
  window.storage = {
    async get(key){const v=localStorage.getItem("mg:"+key);if(v===null)throw new Error("nf");return {key,value:v,shared:false};},
    async set(key,value){localStorage.setItem("mg:"+key,value);return {key,value,shared:false};},
    async delete(key){localStorage.removeItem("mg:"+key);return {key,deleted:true,shared:false};},
    async list(prefix){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("mg:"+(prefix||"")))keys.push(k.slice(3));}return {keys,prefix,shared:false};},
  };
}
</script>
<!-- スクロール時に上部へ白い隙間が出る問題の対策：地色を本体背景に合わせ、オーバースクロールを抑制 -->
<style>

/* app.js（約450KB）読込中のローディング表示。Reactがマウントすると自動で消える */
#root:empty::after{

  position:fixed;inset:0;margin:auto;
  width:34px;height:34px;
  border:3px solid #d6d4cc;border-top-color:#4f46e5;border-radius:50%;
  animation:mg-spin .8s linear infinite;
}
@keyframes mg-spin{to{transform:rotate(360deg)}}
</style>
