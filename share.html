<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構成台本 — ものがたりっち！</title>
<meta name="theme-color" content="#1F2430">
<link rel="icon" href="icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap">
<style>
  html,body{margin:0;padding:0;background:#E9E8E3;font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,sans-serif;color:#1C1C1E}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .script{white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;line-height:1.8;font-size:13.5px}
  .qline{font-weight:700}
  .stripe{background:repeating-linear-gradient(135deg,var(--main) 0 10px,#fff 10px 14px)}
</style>
</head>
<body>
<div id="app" class="max-w-[820px] mx-auto px-3 sm:px-5 py-6">
  <div id="loading" class="text-center text-stone-400 text-sm py-24">読み込み中…</div>
</div>

<!-- コメント投稿 浮動ボタンのテンプレは JS 内で生成 -->

<script>
const API = (() => { try { const o = localStorage.getItem("mg:shareApi"); if (o) return o.replace(/\/$/, ""); } catch(e){} return "https://mg-share.aki-surf89315.workers.dev"; })();
const SECTION_TYPES = {
  "インサート": { full: "インサート", color: "#71717A", bg: "#F0F0F2" },
  "ブリッジ":   { full: "ブリッジ",   color: "#0D9488", bg: "#E0F2EF" },
  "VLOG":      { full: "VLOG",       color: "#D97706", bg: "#FCF0DC" },
  "解説系":     { full: "解説系",     color: "#2563EB", bg: "#E3EBFC" },
  "訴求":      { full: "訴求",        color: "#DC2645", bg: "#FBE5EA" },
};
const params = new URLSearchParams(location.search);
const ID = params.get("id");
const CHID = params.get("ch");
let CHANNEL = null, CASE_SEL = null, CTAB = "script", CHMODE = false;
const esc = (s) => (s||"").replace(/[&<>"]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
/* href用：http(s)のみ許可（javascript:等のスキーム注入を弾く） */
const safeUrl = (u) => { u=(u||"").trim(); return /^https?:\/\//i.test(u) ? esc(u) : ""; };

/* インライン書式: **太字** / !!赤!! （esc 済み文字列に対して適用） */
function inline(text){
  let t = esc(text);
  t = t.replace(/!!([\s\S]+?)!!/g, '<span style="color:#DC2645">$1</span>');
  t = t.replace(/\*\*([\s\S]+?)\*\*/g, '<strong style="font-weight:800">$1</strong>');
  return t;
}
function renderScript(accent, val){
  if(!val) return '<span class="text-stone-300">（原稿未入力）</span>';
  return val.split("\n").map(line => {
    const isQ = /^\s*◼/.test(line);
    return `<span class="${isQ?'qline':''}" ${isQ?`style="color:${accent}"`:''}>${inline(line)}</span>`;
  }).join("\n");
}

let SNAP=null, COMMENTS=[], AUTHOR = (localStorage.getItem("mg:shareAuthor")||"");

async function load(){
  if(CHID){
    CHMODE = true;
    try{
      const r = await fetch(API+"/api/chan/"+CHID);
      if(!r.ok){ document.getElementById("loading").innerHTML = "このチャンネル共有リンクは見つかりませんでした。"; return; }
      CHANNEL = await r.json();
      renderChannel();
    }catch(e){ document.getElementById("loading").textContent = "読み込みに失敗しました：" + e.message; }
    return;
  }
  if(!ID){ document.getElementById("loading").textContent = "リンクが正しくありません（idがありません）。"; return; }
  try{
    const [sR, cR] = await Promise.all([
      fetch(API+"/api/snap/"+ID),
      fetch(API+"/api/snap/"+ID+"/comments"),
    ]);
    if(!sR.ok){ document.getElementById("loading").innerHTML = "この共有リンクは見つかりませんでした。<br>発行者にURLを確認してください。"; return; }
    SNAP = await sR.json();
    COMMENTS = (await cR.json()).comments || [];
    render();
  }catch(e){
    document.getElementById("loading").textContent = "読み込みに失敗しました：" + e.message;
  }
}

function commentsFor(sid){ return COMMENTS.filter(c=>c.sceneId===sid); }

const fmtNum = (n) => { n = Number(n)||0; if(n>=1e8) return (n/1e8).toFixed(1)+"億"; if(n>=1e4) return (n/1e4).toFixed(n>=1e5?0:1)+"万"; return n.toLocaleString(); };
const GC = { S:"#E11D48", A:"#EA580C", B:"#0EA5E9", C:"#9CA3AF" };
function scoreVideo(info){
  if(!info||!info.uploadDate) return null;
  const days=(Date.now()-new Date(info.uploadDate))/86400000;
  if(isNaN(days)) return null;
  const ratio=info.subs>0?info.views/info.subs:0;
  const grade=days>365?'C':ratio>=5?'S':ratio>=3?'A':ratio>=1?'B':'C';
  const ratioStr=ratio>=1?ratio.toFixed(1)+'倍':Math.round(ratio*100)+'%';
  return {grade,ratioStr};
}

let TAB = "script";
function setTab(t){ TAB = t; render(); }

/* ── 構成台本ペイン（コメント機能つき） ── */
function paneScript(p, accent, main){
  let sceneNo = 0, rowsHtml = "";
  (p.rows||[]).forEach(r => {
    if(r.kind === "location"){
      rowsHtml += `<div class="mt-4 mb-2 rounded-t-xl overflow-hidden flex items-stretch" style="background:${main};color:#fff">
        <div class="w-4 shrink-0 stripe"></div>
        <div class="px-3 py-2 font-bold tracking-wide text-[14px]">${esc(r.label||"")}</div>
        ${r.time?`<div class="ml-auto self-center pr-3 text-[11px] opacity-70 mono">${esc(r.time)}</div>`:""}
      </div>`;
      if(r.address || r.note){
        rowsHtml += `<div class="px-3 pb-2 text-[11px] text-stone-500 flex flex-wrap gap-x-4">
          ${r.address?`<span>📍 ${esc(r.address)}</span>`:""}${r.note?`<span>📝 ${esc(r.note)}</span>`:""}</div>`;
      }
      return;
    }
    sceneNo++;
    const t = SECTION_TYPES[r.type] || {full:r.type,color:"#555",bg:"#eee"};
    const cs = commentsFor(r.id);
    const open = cs.filter(c=>!c.resolved).length;
    rowsHtml += `<div class="bg-white border border-stone-200 border-t-0 px-3 py-3 flex gap-3" style="border-left:3px solid ${t.color}">
      <div class="w-8 shrink-0 text-center"><div class="text-[10px] text-stone-300 mono">#${sceneNo}</div></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${t.bg};color:${t.color}">${esc(t.full)}</span>
          <span class="text-[13px] font-bold">${esc(r.label||"")}</span>
        </div>
        <div class="script text-stone-800">${renderScript(accent, r.script)}</div>
        ${CHMODE?'':`<div class="mt-2">
          <button data-c="${r.id}" data-l="${esc(r.label||t.full)}" class="cbtn text-[11px] font-semibold px-2.5 py-1 rounded-full border border-stone-200 hover:bg-stone-50 inline-flex items-center gap-1" style="color:${main}">
            💬 コメント${cs.length?` <span class="mono">${cs.length}</span>`:""}${open?`<span class="ml-1 inline-block w-1.5 h-1.5 rounded-full" style="background:${accent}"></span>`:""}
          </button>
        </div>
        <div id="cwrap-${r.id}" class="hidden mt-2 space-y-2"></div>`}
      </div>
    </div>`;
  });
  return `<div>${rowsHtml}</div>
    <p class="text-center text-[11px] text-stone-400 mt-8 leading-relaxed">各シーンの「💬 コメント」から、気になる点・修正してほしい所を書き込めます。</p>`;
}

/* ── 香盤表ペイン ── */
function paneKouban(p){
  const rows = p.rows||[];
  let html = "", cur = null, blocks = [];
  rows.forEach(r => {
    if(r.kind === "location"){ cur = { loc:r, scenes:[] }; blocks.push(cur); }
    else { if(!cur){ cur = { loc:null, scenes:[] }; blocks.push(cur); } cur.scenes.push(r); }
  });
  if(!blocks.length) return '<div class="text-stone-400 text-sm py-8 text-center">香盤表はまだありません。</div>';
  const last = blocks.length - 1;
  blocks.forEach((b, i) => {
    const loc = b.loc;
    const peak = !!(loc && loc.peak);
    const scenesHtml = b.scenes.map(s=>{const t=SECTION_TYPES[s.type]||{full:s.type,color:"#555",bg:"#eee"};return `<div class="px-3 py-1.5 flex items-center gap-2 text-[12px]">
        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full shrink-0" style="background:${t.bg};color:${t.color}">${esc(t.full)}</span>
        <span class="flex-1 min-w-0 truncate">${esc(s.label||"")}</span>
        ${s.sec?`<span class="text-[10px] text-stone-400 mono shrink-0">${s.sec}秒</span>`:""}
      </div>`}).join("")||'<div class="px-3 py-2 text-[11px] text-stone-300">シーンなし</div>';
    html += `<div class="flex gap-2.5 sm:gap-3">
      <div class="flex flex-col items-center w-[56px] sm:w-[64px] shrink-0 pt-0.5">
        <div class="text-[14px] font-bold mono leading-tight" style="color:var(--main)">${esc(loc&&loc.time||"--:--")}</div>
        <div class="w-6 h-6 mt-1 rounded-full grid place-items-center text-[11px] font-bold text-white mono shadow-sm" style="background:var(--accent)">${i+1}</div>
        ${i<last?`<div class="flex-1 w-0.5 my-1 rounded min-h-[20px]" style="background:var(--main);opacity:.2"></div>`:""}
      </div>
      <div class="relative flex-1 mb-3 rounded-xl overflow-visible border ${peak?'border-2 shadow-md':'border-stone-200 shadow-sm'} bg-white" ${peak?'style="border-color:var(--accent)"':''}>
        ${peak?`<span class="absolute -top-2.5 left-3 z-10 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm text-white" style="background:var(--accent)">★ 山場</span>`:""}
        <div class="flex items-stretch overflow-hidden rounded-t-xl" style="background:var(--main);color:#fff">
          <div class="w-1.5 shrink-0 stripe"></div>
          <div class="px-3 py-2 font-bold text-[13px] flex-1 min-w-0">${esc(loc&&loc.label||"（場所未設定）")}</div>
        </div>
        ${loc&&(loc.address||loc.note)?`<div class="px-3 py-1.5 text-[11px] text-stone-500 border-b border-stone-100 flex flex-wrap gap-x-4">${loc.address?`<span>📍 ${esc(loc.address)}</span>`:""}${loc.note?`<span>📝 ${esc(loc.note)}</span>`:""}</div>`:""}
        <div class="divide-y divide-stone-100">${scenesHtml}</div>
      </div>
    </div>`;
  });
  return html;
}

/* ── トーク系 構成台本ペイン ── */
function paneTalk(p, accent, main){
  const t = p.talk || {};
  const block = (no, title, bodyHtml) => `<div class="rounded-xl border border-stone-200 bg-white mb-3 overflow-hidden">
    <div class="flex items-center gap-2 px-3 py-2 border-b border-stone-100">
      <span class="w-5 h-5 rounded grid place-items-center text-[10px] font-bold text-white" style="background:${main}">${no}</span>
      <span class="text-[12px] font-bold text-stone-600">${title}</span>
    </div><div class="p-3">${bodyHtml}</div></div>`;
  const txt = (v) => v ? `<div class="script text-stone-800">${renderScript(accent, v)}</div>` : '<div class="text-stone-300 text-[12px]">（未入力）</div>';
  let html = "";
  html += block("②", "ハイライト", txt(t.highlight));
  html += block("③", "冒頭", txt(t.intro));
  const toc = (t.toc||[]).filter(x=>x&&x.trim());
  html += block("④", "目次", toc.length ? `<ol class="list-decimal pl-5 space-y-0.5 text-[13px]">${toc.map(x=>`<li>${esc(x)}</li>`).join("")}</ol>` : '<div class="text-stone-300 text-[12px]">（未入力）</div>');
  const bodyHtml = (t.body||[]).map((b,i)=>{
    const cs = commentsFor(b.id); const open = cs.filter(c=>!c.resolved).length;
    return `<div class="mb-2 border border-stone-100 rounded-lg overflow-hidden">
      <div class="px-3 py-1.5 bg-stone-50 text-[12.5px] font-bold flex items-center gap-2"><span class="text-[9px] text-stone-400 mono">本編${i+1}</span>${esc(b.heading||"")}</div>
      <div class="p-3">${txt(b.script)}
      ${CHMODE?'':`<div class="mt-2"><button data-c="${b.id}" data-l="${esc(b.heading||('本編'+(i+1)))}" class="cbtn text-[11px] font-semibold px-2.5 py-1 rounded-full border border-stone-200 hover:bg-stone-50 inline-flex items-center gap-1" style="color:${main}">💬 コメント${cs.length?` <span class="mono">${cs.length}</span>`:""}${open?`<span class="ml-1 inline-block w-1.5 h-1.5 rounded-full" style="background:${accent}"></span>`:""}</button></div>
      <div id="cwrap-${b.id}" class="hidden mt-2 space-y-2"></div>`}</div></div>`;
  }).join("") || '<div class="text-stone-300 text-[12px]">（未入力）</div>';
  html += block("⑤", "本編", bodyHtml);
  html += block("⑥", "CTA", txt(t.cta));
  return html;
}

/* ── 企画・サムネペイン ── */
function panePlans(p){
  const plans = p.plans||[];
  if(!plans.length) return '<div class="text-stone-400 text-sm py-8 text-center">企画案はまだありません。</div>';
  return plans.map((pl,i)=>{
    const refs = (pl.refs||[]).filter(r=>r.vid);
    return `<div class="rounded-xl border border-stone-200 bg-white mb-3 overflow-hidden">
      <div class="px-4 py-2 text-[12px] font-bold" style="background:var(--main);color:#fff">企画案 ${i+1}</div>
      <div class="p-4">
        ${pl.title?`<div class="mb-2"><div class="text-[10px] font-bold text-stone-400">タイトル案</div><div class="text-[15px] font-bold">${esc(pl.title)}</div></div>`:""}
        ${pl.thumbText?`<div class="mb-2"><div class="text-[10px] font-bold text-stone-400">サムネ文言</div><div class="text-[14px] font-bold">${esc(pl.thumbText)}</div></div>`:""}
        ${pl.note?`<div class="mb-3 text-[12px] text-stone-600 whitespace-pre-wrap">${esc(pl.note)}</div>`:""}
        ${refs.length?`<div class="text-[10px] font-bold text-stone-400 mb-1.5">参考動画</div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">${refs.map(rf=>{const sc=scoreVideo(rf);return `<a href="https://www.youtube.com/watch?v=${esc(rf.vid)}" target="_blank" rel="noreferrer" class="block border border-stone-200 rounded-lg overflow-hidden">
          <div class="relative"><img src="https://img.youtube.com/vi/${esc(rf.vid)}/mqdefault.jpg" class="w-full aspect-video object-cover">
          ${sc?`<span class="absolute top-1 left-1 text-[10px] font-bold text-white px-1.5 rounded" style="background:${GC[sc.grade]}">${sc.grade}</span>`:""}</div>
          <div class="p-1.5"><div class="text-[10px] font-bold leading-snug" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(rf.title)}</div>
          <div class="text-[9px] text-stone-400 truncate">${esc(rf.channel)}</div>
          <div class="text-[9px] text-stone-500 mono flex gap-2 mt-0.5"><span>▶ ${fmtNum(rf.views)}</span><span>👤 ${fmtNum(rf.subs)}</span>${sc?`<span style="color:${GC[sc.grade]};font-weight:700">${sc.ratioStr}</span>`:""}</div></div>
        </a>`}).join("")}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

/* ── チャンネルコンセプトペイン ── */
function paneConcept(p){
  const ci = p.channelInfo;
  if(!ci || !(ci.name||ci.url||ci.concept||ci.target||ci.purpose||(ci.competitors||[]).length))
    return '<div class="text-stone-400 text-sm py-8 text-center">チャンネルコンセプトは設定されていません。</div>';
  const field = (label,val) => val?`<div class="mb-3"><div class="text-[10px] font-bold text-stone-400 mb-0.5">${label}</div><div class="text-[13px] whitespace-pre-wrap leading-relaxed">${esc(val)}</div></div>`:"";
  const comps = (ci.competitors||[]).filter(c=>c.name||c.url);
  return `<div class="rounded-xl border border-stone-200 bg-white p-4 mb-3">
    ${(!CHMODE && (ci.name||ci.url))?`<div class="mb-3">${ci.name?`<div class="text-[16px] font-black">${esc(ci.name)}</div>`:""}${ci.url?`<a href="${safeUrl(ci.url)}" target="_blank" rel="noreferrer" class="text-[11px] mono text-sky-600 break-all">${esc(ci.url)}</a>`:""}</div>`:""}
    ${field("コンセプト",ci.concept)}
    ${field("ターゲット",ci.target)}
    ${field("CV先・チャンネルの目的",ci.purpose)}
  </div>
  ${comps.length?`<div class="rounded-xl border border-stone-200 bg-white p-4">
    <div class="text-[11px] font-bold text-stone-500 mb-2">競合チャンネル</div>
    <div class="space-y-2">${comps.map(c=>`<div class="flex items-center gap-2 border border-stone-100 rounded-lg p-2">
      ${c.thumb?`<img src="${esc(c.thumb)}" class="w-8 h-8 rounded-full shrink-0">`:`<div class="w-8 h-8 rounded-full bg-stone-100 shrink-0"></div>`}
      <div class="min-w-0 flex-1"><div class="text-[12px] font-bold truncate">${esc(c.name||c.url)}</div>
      ${c.subs?`<div class="text-[10px] text-stone-500 mono">👤 ${fmtNum(c.subs)}${c.videos?` ・🎬 ${fmtNum(c.videos)}`:""}</div>`:""}
      ${c.note?`<div class="text-[10px] text-stone-400 truncate">${esc(c.note)}</div>`:""}</div>
      ${c.url?`<a href="${safeUrl(c.url)}" target="_blank" rel="noreferrer" class="text-[10px] text-stone-400 shrink-0">↗</a>`:""}
    </div>`).join("")}</div>
  </div>`:""}`;
}

function render(){
  const p = SNAP.project;
  const theme = p.theme || {main:"#1F2430",accent:"#E63946"};
  const accent = theme.accent, main = theme.main;
  const m = p.meta||{};
  const titles = (m.titles||[]).filter(Boolean);
  document.documentElement.style.setProperty("--main", main);
  document.documentElement.style.setProperty("--accent", accent);

  const ci = p.channelInfo;
  const hasConcept = !!(ci && (ci.name||ci.url||ci.concept||ci.target||ci.purpose||(ci.competitors||[]).length));
  const hasPlans = (p.plans||[]).length > 0;
  const tabs = [];
  const isTalk = p.format === "talk";
  if(hasConcept) tabs.push(["concept","チャンネルコンセプト"]);
  if(hasPlans) tabs.push(["plan","企画・サムネ"]);
  tabs.push(["script","構成台本"]);
  if(!isTalk) tabs.push(["kouban","香盤表"]);
  if(!tabs.some(t=>t[0]===TAB)) TAB = "script";

  const tabBar = `<div class="flex gap-1 mb-4 border-b border-stone-200 overflow-x-auto">${tabs.map(([k,label])=>
    `<button data-tab="${k}" class="tabbtn text-[12px] font-bold px-3 py-2 whitespace-nowrap ${TAB===k?'border-b-2':''}" style="${TAB===k?`color:${main};border-color:${accent}`:'color:#9ca3af'}">${label}</button>`).join("")}</div>`;

  const pane = TAB==="concept" ? paneConcept(p)
    : TAB==="plan" ? panePlans(p)
    : TAB==="kouban" ? paneKouban(p)
    : isTalk ? paneTalk(p, accent, main)
    : paneScript(p, accent, main);

  document.getElementById("app").innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <div class="text-[11px] font-bold tracking-[0.2em] text-stone-400">ものがたりっち！</div>
      <div class="text-[11px] text-stone-400">${esc(p.channel||"")}</div>
    </div>
    <div class="rounded-2xl overflow-hidden shadow-sm border border-stone-200 mb-5">
      <div class="px-5 py-4" style="background:${main};color:#fff">
        <div class="text-[18px] font-black leading-snug">${esc(titles[0]||p.name||"構成台本")}</div>
        <div class="mt-1 text-[12px] opacity-80 flex flex-wrap gap-x-4">
          ${m.shootDate?`<span>撮影日 ${esc(m.shootDate)}</span>`:""}
          ${m.place?`<span>場所 ${esc(m.place)}</span>`:""}
        </div>
      </div>
      ${m.highlight&&TAB==="script"?`<div class="bg-white px-5 py-3 border-t border-stone-100">
        <div class="text-[10px] font-bold text-stone-400 mb-1">冒頭フック</div>
        <div class="script">${renderScript(accent, m.highlight)}</div></div>`:""}
    </div>
    ${tabBar}
    <div>${pane}</div>
    <p class="text-center text-[11px] text-stone-400 mt-8 leading-relaxed">制作：ものがたりっち！</p>
  `;

  document.querySelectorAll(".tabbtn").forEach(b => b.addEventListener("click", () => setTab(b.dataset.tab)));
  document.querySelectorAll(".cbtn").forEach(b => b.addEventListener("click", () => toggleComments(b.dataset.c, b.dataset.l)));
}

function renderChannel(){
  const ch = CHANNEL; const ci = ch.channelInfo || {};
  const cases = ch.cases || [];
  const theme = (cases[0] && cases[0].theme) || {main:"#1F2430",accent:"#E63946"};
  const mainC = theme.main, accentC = theme.accent;
  document.documentElement.style.setProperty("--main", mainC);
  const caseTitle = (c,i) => (c.plans&&c.plans[0]&&c.plans[0].title)||c.name||('案件'+(i+1));
  const caseThumb = (c) => { const r=(c.plans||[]).map(p=>(p.refs||[]).find(x=>x&&x.vid)).find(Boolean); return r?`https://img.youtube.com/vi/${r.vid}/mqdefault.jpg`:null; };

  const header = `
    <div class="text-[11px] font-bold tracking-[0.2em] text-stone-400 mb-2">CHANNEL / チャンネル資料</div>
    <div class="rounded-2xl overflow-hidden shadow-sm border border-stone-200 mb-5">
      <div class="px-5 py-4" style="background:${mainC};color:#fff"><div class="text-[18px] font-black">${esc((ci.name)||ch.name||"チャンネル")}</div>${ci.url?`<a href="${safeUrl(ci.url)}" target="_blank" rel="noreferrer" class="text-[11px] opacity-80 mono break-all">${esc(ci.url)}</a>`:""}</div>
    </div>`;

  if(CASE_SEL === null || !cases[CASE_SEL]){
    // 企画一覧（カード）
    const listHtml = cases.length ? `<div class="grid sm:grid-cols-2 gap-2.5">${cases.map((c,i)=>{
      const th = caseThumb(c);
      const badge = c.format==="talk" ? '🎙️ トーク' : '🎬 一日密着';
      const sc = (c.rows||[]).filter(r=>r.kind==='scene').length;
      const meta = c.format==="talk" ? `${(c.talk&&c.talk.body||[]).length}本編` : `${sc}シーン`;
      return `<button data-case="${i}" class="caseopen text-left bg-white border border-stone-200 rounded-xl overflow-hidden hover:shadow-md transition-shadow flex">
        <div class="w-24 shrink-0 bg-stone-100">${th?`<img src="${th}" class="w-full h-full object-cover">`:`<div class="w-full h-full aspect-video grid place-items-center text-stone-300 text-[10px]">no img</div>`}</div>
        <div class="p-2.5 min-w-0 flex-1">
          <div class="text-[10px] text-stone-400 mb-0.5">${badge} ・ ${meta}</div>
          <div class="text-[13px] font-bold leading-snug" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(caseTitle(c,i))}</div>
          <div class="text-[11px] mt-1 font-bold" style="color:${accentC}">開く →</div>
        </div></button>`;
    }).join("")}</div>` : '<p class="text-stone-400 text-[12px] py-4 text-center">案件がありません</p>';
    document.getElementById("app").innerHTML = header
      + `<div class="mb-6">${paneConcept({channelInfo: ci})}</div>`
      + `<div class="text-[11px] font-bold tracking-[0.15em] text-stone-400 mb-2">企画一覧（${cases.length}）</div>`
      + listHtml
      + `<p class="text-center text-[11px] text-stone-400 mt-8">制作：ものがたりっち！</p>`;
    document.querySelectorAll(".caseopen").forEach(b=>b.addEventListener("click",()=>{ CASE_SEL=+b.dataset.case; CTAB="script"; window.scrollTo(0,0); renderChannel(); }));
    return;
  }

  // 個別の企画を開いた状態
  const sel = cases[CASE_SEL];
  const isTalk = sel.format === "talk";
  const hasPlans = (sel.plans||[]).length>0;
  const sub = [];
  if(hasPlans) sub.push(["plan","サムネ・タイトル"]);
  sub.push(["script","構成台本"]);
  if(!isTalk) sub.push(["kouban","香盤表"]);
  if(!sub.some(s=>s[0]===CTAB)) CTAB="script";
  const subBar = `<div class="flex gap-1 mb-3 border-b border-stone-200 overflow-x-auto">${sub.map(([k,label])=>`<button data-ctab="${k}" class="ctabbtn text-[12px] font-bold px-3 py-1.5 whitespace-nowrap ${CTAB===k?'border-b-2':''}" style="${CTAB===k?`color:${mainC};border-color:${accentC}`:'color:#9ca3af'}">${label}</button>`).join("")}</div>`;
  const pane = CTAB==="plan"?panePlans(sel):CTAB==="kouban"?paneKouban(sel):isTalk?paneTalk(sel,accentC,mainC):paneScript(sel,accentC,mainC);
  document.getElementById("app").innerHTML = header
    + `<button id="backBtn" class="text-[12px] font-bold mb-3 inline-flex items-center gap-1" style="color:${mainC}">← 企画一覧へ戻る</button>`
    + `<div class="text-[16px] font-black mb-3">${esc(caseTitle(sel,CASE_SEL))}</div>`
    + subBar + `<div>${pane}</div>`
    + `<p class="text-center text-[11px] text-stone-400 mt-8">制作：ものがたりっち！</p>`;
  document.getElementById("backBtn").addEventListener("click",()=>{ CASE_SEL=null; window.scrollTo(0,0); renderChannel(); });
  document.querySelectorAll(".ctabbtn").forEach(b=>b.addEventListener("click",()=>{ CTAB=b.dataset.ctab; renderChannel(); }));
}

function fmtTime(iso){ return (iso||"").slice(5,16).replace("T"," "); }

function toggleComments(sid, label){
  const wrap = document.getElementById("cwrap-"+sid);
  if(!wrap) return;
  if(!wrap.classList.contains("hidden")){ wrap.classList.add("hidden"); return; }
  wrap.classList.remove("hidden");
  renderCommentBox(sid, label);
}

function renderCommentBox(sid, label){
  const wrap = document.getElementById("cwrap-"+sid);
  const cs = commentsFor(sid);
  const listHtml = cs.length ? cs.map(c=>`
    <div class="rounded-lg border ${c.resolved?'bg-emerald-50 border-emerald-200':'bg-stone-50 border-stone-200'} px-3 py-2">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-bold text-stone-600">${esc(c.author||"ゲスト")}${c.resolved?' <span class="text-emerald-600">✓対応済</span>':''}</span>
        <span class="text-[10px] text-stone-400">${fmtTime(c.createdAt)}</span>
      </div>
      <div class="text-[12.5px] text-stone-800 whitespace-pre-wrap break-words mt-0.5">${esc(c.text)}</div>
    </div>`).join("") : '<div class="text-[11px] text-stone-400">まだコメントはありません。</div>';

  wrap.innerHTML = `
    <div class="space-y-1.5">${listHtml}</div>
    <div class="rounded-lg border border-stone-200 bg-white p-2">
      <input id="au-${sid}" value="${esc(AUTHOR)}" placeholder="お名前（任意）" class="w-full text-[12px] px-2 py-1.5 mb-1.5 bg-stone-50 rounded focus:outline-none">
      <textarea id="tx-${sid}" rows="2" placeholder="このシーンへのコメント・修正依頼…" class="w-full text-[13px] px-2 py-1.5 border border-stone-200 rounded focus:outline-none resize-y"></textarea>
      <div class="flex justify-end mt-1.5">
        <button id="sb-${sid}" class="text-[11px] font-bold text-white px-4 py-1.5 rounded-lg shadow" style="background:var(--main)">送信</button>
      </div>
    </div>`;
  wrap.querySelector("#sb-"+sid).addEventListener("click", () => postComment(sid, label));
}

async function postComment(sid, label){
  const tx = document.getElementById("tx-"+sid);
  const au = document.getElementById("au-"+sid);
  const text = (tx.value||"").trim();
  if(!text){ tx.focus(); return; }
  AUTHOR = (au.value||"").trim();
  try{ localStorage.setItem("mg:shareAuthor", AUTHOR); }catch(e){}
  const btn = document.getElementById("sb-"+sid); btn.disabled=true; btn.textContent="送信中…";
  try{
    const r = await fetch(API+"/api/snap/"+ID+"/comments", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ sceneId: sid, sceneLabel: label, author: AUTHOR||"ゲスト", text })
    });
    const d = await r.json();
    if(d.comment){ COMMENTS.push(d.comment); render(); toggleComments(sid, label); }
    else throw new Error(d.error||"送信失敗");
  }catch(e){
    btn.disabled=false; btn.textContent="送信";
    alert("送信に失敗しました：" + e.message);
  }
}

load();
</script>
