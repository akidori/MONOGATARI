<script>
const API = (() => { try { const o = localStorage.getItem("mg:shareApi"); if (o) return o.replace(/\/$/, ""); } catch(e){} return "https://mg-share.aki-surf89315.workers.dev"; })();
const SECTION_TYPES = {

};
const params = new URLSearchParams(location.search);
const ID = params.get("id");
const CHID = params.get("ch");
const R = params.get("r") || "";  // 閲覧トークン（新方式snap）。無い旧snapはサーバ側graceで従来通り読める
const RQ = R ? ("?r=" + encodeURIComponent(R)) : "";
const LOCK_TAB = params.get("tab");  // 単一タブ共有（&tab=script等）。指定時はそのペインだけ表示しタブバー非表示
const ALLOW_TABS = (params.get("tabs")||"").split(",").map(s=>s.trim()).filter(Boolean);  // 複数タブ束ね共有（&tabs=video,script）。指定タブだけ見せる（その中での切替は可）
const START_TAB = params.get("start");  // 着地タブ（&start=video）。最初に開くタブ
const UP_TOKEN = params.get("up") || "";  // 編集者用アップロードトークン。あれば大容量アップ可＋動画タブ常時表示
const CAN_RESOLVE = !!UP_TOKEN;  // 同トークンで「対応済み」チェックも可（直した本人がその場でチェック）
let CHANNEL = null, CASE_SEL = null, CTAB = "script", CHMODE = false;
const esc = (s) => (s||"").replace(/[&<>"]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
const CMT_CATS = ["編集","構成","サムネ","BGM","SE","テロップ","色味","演出","その他"];
const CMT_STATUS_COL = {"未対応":["#FBE5EA","#DC2645"],"対応中":["#FCF0DC","#D97706"],"確認待ち":["#E3EBFC","#2563EB"],"完了":["#E7F6EC","#15803D"]};
const CMT_PRIO_COL = {"高":["#DC2645","#fff"],"中":["#E8A33D","#fff"],"低":["#E5E5E5","#57534E"]};
const cStat = (c) => c.status || (c.resolved ? "完了" : "未対応");
/* 右上バーと同系のピル型ボタン用SVGピクトグラム（UIに絵文字は使わない） */
const ICONS = {
  comment: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  edit: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',

  plus: '<path d="M12 5v14"/><path d="M5 12h14"/>',
  send: '<path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/>',
  download: '<path d="M12 4v13"/><path d="M6 11l6 6 6-6"/><path d="M4 20h16"/>',
  film: '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16"/><path d="M17 4v16"/><path d="M2 9h5"/><path d="M2 15h5"/><path d="M17 9h5"/><path d="M17 15h5"/>',
  back: '<path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>',
  reply: '<path d="M9 17l-5-5 5-5"/><path d="M4 12h11a5 5 0 0 1 5 5v2"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  undo: '<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/>',
  pin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>',
  note: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
  user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
};
const icon = (name, cls="w-3.5 h-3.5") => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${cls} shrink-0">${ICONS[name]||""}</svg>`;
/* YouTube流の起動チューニング：低画質で即開始→自動昇格（初動体感の要） */
const HLS_TUNE = {startLevel:0,capLevelToPlayerSize:true,abrEwmaFastVoD:2,abrEwmaSlowVoD:6,maxBufferLength:40,backBufferLength:30,startFragPrefetch:true};
let _hlsShareP = null;
function loadHlsShare(){ if(window.Hls) return Promise.resolve(window.Hls); if(_hlsShareP) return _hlsShareP; _hlsShareP = new Promise((res)=>{ const s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"; s.onload=()=>res(window.Hls); s.onerror=()=>res(null); document.head.appendChild(s); }); return _hlsShareP; }
/* この端末で投稿したコメントID（自分の投稿だけ削除ボタンを出す） */
let MINE = (()=>{ try{ return JSON.parse(localStorage.getItem("mg:myc:"+ID)||"[]"); }catch(e){ return []; } })();
function markMine(cid){ if(cid && !MINE.includes(cid)){ MINE.push(cid); try{ localStorage.setItem("mg:myc:"+ID, JSON.stringify(MINE)); }catch(e){} } }
/* href用：http(s)のみ許可（javascript:等のスキーム注入を弾く） */
const safeUrl = (u) => { u=(u||"").trim(); return /^https?:\/\//i.test(u) ? esc(u) : ""; };

/* インライン書式: **太字** / !!赤!! （esc 済み文字列に対して適用） */
function inline(text){
  let t = esc(text);
  t = t.replace(/!!([\s\S]+?)!!/g, '<span style="color:#DC2645">$1</span>');
  t = t.replace(/\*\*([\s\S]+?)\*\*/g, '<strong style="font-weight:800">$1</strong>');
  return t;
}
/* ブロック書式: 「・」「- 」始まりは箇条書き、「> 」始まりはコールアウト。行内は inline() で装飾。 */
function richBlocks(text){
  const lines = (text||"").replace(/\r/g,"").split("\n");
  let html = "", i = 0;
  const isBullet = (l) => /^[・･]\s?/.test(l) || /^-\s/.test(l);
  const isCallout = (l) => /^>\s?/.test(l);
  while(i < lines.length){
    if(isCallout(lines[i])){
      const buf=[]; while(i<lines.length && isCallout(lines[i])){ buf.push(lines[i].replace(/^>\s?/,"")); i++; }
      html += `<div style="border-left:4px solid #F5A623;background:#FEF7EC;border-radius:8px;padding:8px 12px;margin:6px 0">${buf.map(inline).join("<br>")}</div>`;
      continue;
    }
    if(isBullet(lines[i])){
      const buf=[]; while(i<lines.length && isBullet(lines[i])){ buf.push(lines[i].replace(/^[・･]\s?/,"").replace(/^-\s/,"")); i++; }
      html += `<ul style="margin:4px 0;padding:0;list-style:none">${buf.map(b=>`<li style="display:flex;gap:7px;margin:2px 0"><span style="color:#F5A623;flex:none">・</span><span>${inline(b)}</span></li>`).join("")}</ul>`;
      continue;
    }
    html += inline(lines[i]) + (i < lines.length-1 ? "<br>" : "");
    i++;
  }
  return html;
}
function renderScript(accent, val){
  if(!val) return '<span class="text-stone-300">（原稿未入力）</span>';
  return val.split("\n").map(line => {
    const isQ = /^\s*◼/.test(line);
    return `<span class="${isQ?'qline':''}" ${isQ?`style="color:${accent}"`:''}>${inline(line)}</span>`;
  }).join("\n");
}

let SNAP=null, COMMENTS=[], AUTHOR = (localStorage.getItem("mg:shareAuthor")||"");

async function load(){
  if(CHID){
    CHMODE = true;
    try{
      const r = await fetch(API+"/api/chan/"+CHID);
      if(!r.ok){ document.getElementById("loading").innerHTML = "このチャンネル共有リンクは見つかりませんでした。"; return; }
      CHANNEL = await r.json();
      // 編集つき共有：各案件を live 文書の最新値で上書き（先方が直した内容を一覧にも反映）
      if(CHANNEL.editable && Array.isArray(CHANNEL.cases)){
        CHANNEL.cases = await Promise.all(CHANNEL.cases.map(async (c)=>{
          if(c && c.edit && c.edit.liveId && c.edit.editToken){
            try{
              const sr = await fetch(API+"/api/live/"+c.edit.liveId+"/snapshot?k="+encodeURIComponent(c.edit.editToken));
              if(sr.ok){ const sd = await sr.json(); if(sd && sd.project) return { ...sd.project, edit:c.edit }; }
            }catch(e){}
          }
          return c;
        }));
      }
      renderChannel();
    }catch(e){ document.getElementById("loading").textContent = "読み込みに失敗しました：" + e.message; }
    return;
  }
  if(!ID){ document.getElementById("loading").textContent = "リンクが正しくありません（idがありません）。"; return; }
  try{
    const [sR, cR] = await Promise.all([
      fetch(API+"/api/snap/"+ID+RQ),
      fetch(API+"/api/snap/"+ID+"/comments"),
    ]);
    if(!sR.ok){
      document.getElementById("loading").innerHTML = sR.status===401
        ? "このリンクは無効か、権限が必要です。<br>共有元に最新の共有リンクを依頼してください。"
        : "この共有リンクは見つかりませんでした。<br>発行者にURLを確認してください。";
      return;
    }
    SNAP = await sR.json();
    COMMENTS = (await cR.json()).comments || [];
    try{ const uR = await fetch(API+"/api/snap/"+ID+"/uploads"); if(uR.ok) UPLOADS = (await uR.json()).uploads || []; }catch(e){}
    render();
    // 自動更新：ロード後に届いた編集者アップ／エンコード完了を、リロード無しで反映（凍結ページ問題の根治）
    POLL_SIG = optionsSig(SNAP, UPLOADS) + "#" + commentsSig(COMMENTS);
    if(!window._mgPoll) window._mgPoll = setInterval(pollUpdates, 20000);
  }catch(e){
    document.getElementById("loading").textContent = "読み込みに失敗しました：" + e.message;
  }
}

/* ── 共有ページ自動更新（凍結ページ根治）──────────────────────
   ロード時点のスナップで固まるのを防ぐ。20秒ごとに /api/snap を再取得し、
   動画の版・ready状態・編集者アップに変化があれば反映。/api/snap はサーバ側で
   Stream変換完了を自己治癒するので、再取得＝ready昇格も兼ねる。
   再生中／コメント入力中は割り込まず「更新」ピルを出し、タップで反映。 */
let PENDING=null, POLL_SIG="";
function optionsSig(snap, uploads){
  try{
    const p = snap && (snap.project||snap); if(!p) return "";
    const vers = (p.review && p.review.versions) || [];
    const vs = vers.filter(v=>v && !v.trashedAt).map(v=>(v.uid||v.key||v.url||"")+":"+(v.ready?1:0)+":"+(v.hls?1:0)).join(",");
    const us = (uploads||[]).map(u=>u.key||"").join(",");
    return vs+"|"+us;
  }catch(e){ return ""; }
}
// コメント署名：追加/削除/対応ステータス/返信件数の変化を検知（先方が開きっぱなしでも新コメントが反映される）
function commentsSig(comments){
  try{ return (comments||[]).map(c=>(c.id||"")+":"+(c.status||"")+":"+((c.replies||[]).length)).join(","); }
  catch(e){ return ""; }
}
async function pollUpdates(){
  if(CHMODE || !ID || document.hidden) return;
  try{
    const sR = await fetch(API+"/api/snap/"+ID+RQ);
    if(!sR.ok) return;
    const snap = await sR.json();
    let uploads = UPLOADS;
    try{ const uR = await fetch(API+"/api/snap/"+ID+"/uploads"); if(uR.ok) uploads = (await uR.json()).uploads || []; }catch(e){}
    let comments = COMMENTS;
    try{ const cR = await fetch(API+"/api/snap/"+ID+"/comments"); if(cR.ok) comments = (await cR.json()).comments || []; }catch(e){}
    const sig = optionsSig(snap, uploads) + "#" + commentsSig(comments);
    if(!sig || sig === POLL_SIG) return;
    POLL_SIG = sig;
    const busy = (videoEl && !videoEl.paused && !videoEl.ended) || (document.activeElement && /TEXTAREA|INPUT/.test(document.activeElement.tagName||""));
    if(busy){ PENDING = { snap, uploads, comments }; showUpdatePill(); }
    else { SNAP = snap; UPLOADS = uploads; COMMENTS = comments; PENDING = null; hideUpdatePill(); render(); }
  }catch(e){}
}
function applyPending(){ if(PENDING){ SNAP = PENDING.snap; UPLOADS = PENDING.uploads; if(PENDING.comments) COMMENTS = PENDING.comments; PENDING = null; } hideUpdatePill(); render(); }
function showUpdatePill(){
  if(document.getElementById("mg-refresh-pill")) return;
  const b=document.createElement("button"); b.id="mg-refresh-pill"; b.onclick=applyPending;
  b.textContent="新しい更新が届きました ↻ タップで反映";
  b.style.cssText="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;background:#1C1C1E;color:#fff;border:0;border-radius:999px;padding:10px 18px;font-size:13px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);cursor:pointer";
  document.body.appendChild(b);
}
function hideUpdatePill(){ const b=document.getElementById("mg-refresh-pill"); if(b) b.remove(); }

function commentsFor(sid){ return COMMENTS.filter(c=>c.sceneId===sid); }

const fmtNum = (n) => { n = Number(n)||0; if(n>=1e8) return (n/1e8).toFixed(1)+"億"; if(n>=1e4) return (n/1e4).toFixed(n>=1e5?0:1)+"万"; return n.toLocaleString(); };
const GC = { S:"#E11D48", A:"#EA580C", B:"#0EA5E9", C:"#9CA3AF" };
function scoreVideo(info){
  if(!info||!info.uploadDate) return null;
  const days=(Date.now()-new Date(info.uploadDate))/86400000;
  if(isNaN(days)) return null;
  const ratio=info.subs>0?info.views/info.subs:0;
  const grade=days>365?'C':ratio>=5?'S':ratio>=3?'A':ratio>=1?'B':'C';
  const ratioStr=ratio>=1?ratio.toFixed(1)+'倍':Math.round(ratio*100)+'%';
  return {grade,ratioStr};
}

let TAB = START_TAB || "script";
/* 動画確認タブ用の状態 */
let UPLOADS = [];          // 先方アップロード一覧（/api/snap/{id}/uploads）
let ytPlayer = null;       // YouTube IFrame Player
let videoEl = null;        // HTML5 video 要素
let ytTimer = null;        // YouTube の再生位置ポーリング

let VLIST_OPEN = false;    // 過去の版・別動画のリストを開いているか（既定は畳んで最新版だけ＝旧版誤確認の防止）
function setTab(t){

  TAB = t; render();
}

/* ── 構成台本ペイン（コメント機能つき） ── */
function paneScript(p, accent, main){
  // 本体エディタと同じ時間計算：時間＝ロケ到着時刻＋尺の積み上げ（時刻未設定なら動画内TC）、
  // 所要時間＝文字数÷rate字/秒（原稿が空ならシーンの目標秒数で積む）。
  const rate = p.rate || 5;
  const fmtT = (sec)=>{ const s=Math.round(sec); return p.timeFormat==="jp" ? (Math.floor(s/60)+"分"+String(s%60).padStart(2,"0")+"秒") : (String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")); };
  const parseClock = (str)=>{ const m=(str||"").trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/); return m ? (+m[1])*3600+(+m[2])*60+(+(m[3]||0)) : null; };
  const fmtClock = (sec)=>{ if(sec==null) return ""; const s=((Math.round(sec)%86400)+86400)%86400; return Math.floor(s/3600)+":"+String(Math.floor((s%3600)/60)).padStart(2,"0"); };
  const nChars = (s)=>(s||"").replace(/\s/g,"").length;
  let sceneNo = 0, rowsHtml = "";
  let acc = 0, totalTarget = 0, totalChars = 0, anchorClock = null, anchorTcIn = 0;
  (p.rows||[]).forEach(r => {
    if(r.tc != null && r.tc !== "" && !isNaN(Number(r.tc))) acc = Number(r.tc);
    if(r.kind === "location"){
      const lc = parseClock(r.time);
      if(lc != null){ anchorClock = lc; anchorTcIn = acc; }
      rowsHtml += `<div class="mt-4 mb-2 rounded-t-xl overflow-hidden flex items-stretch" style="background:${main};color:#fff">
        <div class="w-4 shrink-0 stripe"></div>
        <div class="px-3 py-2 font-bold tracking-wide text-[14px]">${esc(r.label||"")}</div>
        ${r.time?`<div class="ml-auto self-center pr-3 text-[11px] opacity-70 mono">${esc(r.time)}</div>`:""}
      </div>`;
      if(r.address || r.note){
        rowsHtml += `<div class="px-3 pb-2 text-[11px] text-stone-500 flex flex-wrap gap-x-4">
          ${r.address?`<span class="inline-flex items-center gap-1">${icon("pin","w-3 h-3")}${esc(r.address)}</span>`:""}${r.note?`<span class="inline-flex items-center gap-1">${icon("note","w-3 h-3")}${esc(r.note)}</span>`:""}</div>`;
      }
      return;
    }
    sceneNo++;
    const t = SECTION_TYPES[r.type] || {full:r.type,color:"#555",bg:"#eee"};
    const target = (r.sec != null && r.sec !== "") ? Number(r.sec) : (t.target || 0);
    const ch = nChars(r.script);
    const dur = ch > 0 ? ch/rate : target;
    const timeLabel = anchorClock != null ? fmtClock(anchorClock + (acc - anchorTcIn)) : fmtT(acc);
    const cs = commentsFor(r.id);
    const open = cs.filter(c=>!c.resolved).length;
    rowsHtml += `<div class="bg-white border border-stone-200 border-t-0 px-3 py-3 flex gap-3" style="border-left:3px solid ${t.color}">
      <div class="w-11 shrink-0 text-center pt-0.5">
        <div class="text-[11px] text-stone-400 mono leading-tight" style="font-variant-numeric:tabular-nums" title="ロケ到着時刻＋尺の積み上げ（時刻未設定なら動画内TC）">${timeLabel}</div>
        <div class="text-[10px] text-stone-300 mono">#${sceneNo}</div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${t.bg};color:${t.color}">${esc(t.full)}</span>
          <span class="text-[13px] font-bold">${esc(r.label||"")}</span>
          <span class="ml-auto shrink-0 inline-flex items-baseline gap-2 text-[10px] text-stone-400 mono" style="font-variant-numeric:tabular-nums">
            <span title="目標秒数">${target}秒</span>
            <span title="所要時間（文字数÷${rate}字/秒）・文字数">${ch>0?fmtT(ch/rate):"—"}・${ch}字</span>
          </span>
        </div>
        <div class="script text-stone-800">${renderScript(accent, r.script)}</div>
        ${CHMODE?'':`<div class="mt-2">
          <button data-c="${r.id}" data-l="${esc(r.label||t.full)}" class="cbtn text-[11px] font-bold pl-2.5 pr-3 py-1.5 rounded-full shadow-sm bg-white border border-stone-200 hover:bg-stone-50 inline-flex items-center gap-1.5" style="color:${main}">
            ${icon("comment","w-3 h-3")}コメント${cs.length?` <span class="mono">${cs.length}</span>`:""}${open?`<span class="ml-1 inline-block w-1.5 h-1.5 rounded-full" style="background:${accent}"></span>`:""}
          </button>
        </div>
        <div id="cwrap-${r.id}" class="hidden mt-2 space-y-2"></div>`}
      </div>
    </div>`;
    acc += dur; totalTarget += target; totalChars += ch;
  });
  return `<div>${rowsHtml}</div>
    <div class="flex justify-end gap-4 mt-3 pr-1 text-[11px] text-stone-500 mono" style="font-variant-numeric:tabular-nums">

}

/* ── 香盤表ペイン ── */
function paneKouban(p){
  const rows = p.rows||[];
  let html = "", cur = null, blocks = [];
  rows.forEach(r => {
    if(r.kind === "location"){ cur = { loc:r, scenes:[] }; blocks.push(cur); }
    else { if(!cur){ cur = { loc:null, scenes:[] }; blocks.push(cur); } cur.scenes.push(r); }
  });
  if(!blocks.length) return '<div class="text-stone-400 text-sm py-8 text-center">香盤表はまだありません。</div>';
  const last = blocks.length - 1;
  blocks.forEach((b, i) => {
    const loc = b.loc;
    const peak = !!(loc && loc.peak);
    const scenesHtml = b.scenes.map(s=>{const t=SECTION_TYPES[s.type]||{full:s.type,color:"#555",bg:"#eee"};return `<div class="px-3 py-1.5 flex items-center gap-2 text-[12px]">
        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full shrink-0" style="background:${t.bg};color:${t.color}">${esc(t.full)}</span>
        <span class="flex-1 min-w-0 truncate">${esc(s.label||"")}</span>
        ${s.sec?`<span class="text-[10px] text-stone-400 mono shrink-0">${s.sec}秒</span>`:""}
      </div>`}).join("")||'<div class="px-3 py-2 text-[11px] text-stone-300">シーンなし</div>';
    html += `<div class="flex gap-2.5 sm:gap-3">
      <div class="flex flex-col items-center w-[56px] sm:w-[64px] shrink-0 pt-0.5">
        <div class="w-full text-center text-[14px] font-bold mono leading-tight" style="color:var(--main)">${esc(loc&&loc.time||"--:--")}</div>
        <div class="w-6 h-6 mt-1 rounded-full grid place-items-center text-[11px] font-bold text-white mono shadow-sm" style="background:var(--accent)">${i+1}</div>
        ${i<last?`<div class="flex-1 w-0.5 my-1 rounded min-h-[20px]" style="background:var(--main);opacity:.2"></div>`:""}
      </div>
      <div class="relative flex-1 mb-3 rounded-xl overflow-visible border ${peak?'border-2 shadow-md':'border-stone-200 shadow-sm'} bg-white" ${peak?'style="border-color:var(--accent)"':''}>
        ${peak?`<span class="absolute -top-2.5 left-3 z-10 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm text-white" style="background:var(--accent)">★ 山場</span>`:""}
        <div class="flex items-stretch overflow-hidden rounded-t-xl" style="background:var(--main);color:#fff">
          <div class="w-1.5 shrink-0 stripe"></div>
          <div class="px-3 py-2 font-bold text-[13px] flex-1 min-w-0">${esc(loc&&loc.label||"（場所未設定）")}</div>
        </div>
        ${loc&&(loc.address||loc.note)?`<div class="px-3 py-1.5 text-[11px] text-stone-500 border-b border-stone-100 flex flex-wrap gap-x-4">${loc.address?`<span class="inline-flex items-center gap-1">${icon("pin","w-3 h-3")}${esc(loc.address)}</span>`:""}${loc.note?`<span class="inline-flex items-center gap-1">${icon("note","w-3 h-3")}${esc(loc.note)}</span>`:""}</div>`:""}
        <div class="divide-y divide-stone-100">${scenesHtml}</div>
      </div>
    </div>`;
  });
  return html;
}

/* ── トーク系 構成台本ペイン ── */
function paneTalk(p, accent, main){
  const t = p.talk || {};
  const block = (no, title, bodyHtml) => `<div class="rounded-xl border border-stone-200 bg-white mb-3 overflow-hidden">
    <div class="flex items-center gap-2 px-3 py-2 border-b border-stone-100">
      <span class="w-5 h-5 rounded grid place-items-center text-[10px] font-bold text-white" style="background:${main}">${no}</span>
      <span class="text-[12px] font-bold text-stone-600">${title}</span>
    </div><div class="p-3">${bodyHtml}</div></div>`;
  const txt = (v) => v ? `<div class="script text-stone-800">${renderScript(accent, v)}</div>` : '<div class="text-stone-300 text-[12px]">（未入力）</div>';
  let html = "";
  html += block("②", "ハイライト", txt(t.highlight));
  html += block("③", "冒頭", txt(t.intro));
  const toc = (t.toc||[]).filter(x=>x&&x.trim());
  html += block("④", "目次", toc.length ? `<ol class="list-decimal pl-5 space-y-0.5 text-[13px]">${toc.map(x=>`<li>${esc(x)}</li>`).join("")}</ol>` : '<div class="text-stone-300 text-[12px]">（未入力）</div>');
  const bodyHtml = (t.body||[]).map((b,i)=>{
    const cs = commentsFor(b.id); const open = cs.filter(c=>!c.resolved).length;
    return `<div class="mb-2 border border-stone-100 rounded-lg overflow-hidden">
      <div class="px-3 py-1.5 bg-stone-50 text-[12.5px] font-bold flex items-center gap-2"><span class="text-[9px] text-stone-400 mono">本編${i+1}</span>${esc(b.heading||"")}</div>
      <div class="p-3">${txt(b.script)}
      ${CHMODE?'':`<div class="mt-2"><button data-c="${b.id}" data-l="${esc(b.heading||('本編'+(i+1)))}" class="cbtn text-[11px] font-bold pl-2.5 pr-3 py-1.5 rounded-full shadow-sm bg-white border border-stone-200 hover:bg-stone-50 inline-flex items-center gap-1.5" style="color:${main}">${icon("comment","w-3 h-3")}コメント${cs.length?` <span class="mono">${cs.length}</span>`:""}${open?`<span class="ml-1 inline-block w-1.5 h-1.5 rounded-full" style="background:${accent}"></span>`:""}</button></div>
      <div id="cwrap-${b.id}" class="hidden mt-2 space-y-2"></div>`}</div></div>`;
  }).join("") || '<div class="text-stone-300 text-[12px]">（未入力）</div>';
  html += block("⑤", "本編", bodyHtml);
  html += block("⑥", "CTA", txt(t.cta));
  return html;
}

/* ── チャンネルコンセプトペイン ── */

    <div class="text-[13px] font-bold mb-3" style="color:${main}">${esc(sec.title||"")}</div>
    ${(sec.items||[]).map(it=>`<div class="mb-3">

      <div class="text-[13px] leading-relaxed ${(it.value||"").trim()?'text-stone-700':'text-stone-300'}">${(it.value||"").trim()?richBlocks(it.value):"（未記入）"}</div>
    </div>`).join("")}

}
function paneManual(p, accent, main){
  const groups = [["この案件", p.manuals||[]], [(p.channelInfo&&p.channelInfo.name)||"チャンネル", (p.channelInfo&&p.channelInfo.manuals)||[]], ["全体の決め事", p.manualsGlobal||[]]];

function paneConcept(p){

  if(!ci || !(ci.name||ci.url||ci.concept||ci.target||ci.purpose||(ci.competitors||[]).length))
    return '<div class="text-stone-400 text-sm py-8 text-center">チャンネルコンセプトは設定されていません。</div>';

  const comps = (ci.competitors||[]).filter(c=>c.name||c.url);
  return `<div class="rounded-xl border border-stone-200 bg-white p-4 mb-3">
    ${(!CHMODE && (ci.name||ci.url))?`<div class="mb-3">${ci.name?`<div class="text-[16px] font-black">${esc(ci.name)}</div>`:""}${ci.url?`<a href="${safeUrl(ci.url)}" target="_blank" rel="noreferrer" class="text-[11px] mono text-sky-600 break-all">${esc(ci.url)}</a>`:""}</div>`:""}
    ${field("コンセプト",ci.concept)}
    ${field("ターゲット",ci.target)}
    ${field("CV先・チャンネルの目的",ci.purpose)}

  ${comps.length?`<div class="rounded-xl border border-stone-200 bg-white p-4">
    <div class="text-[11px] font-bold text-stone-500 mb-2">競合チャンネル</div>
    <div class="space-y-2">${comps.map(c=>`<div class="flex items-center gap-2 border border-stone-100 rounded-lg p-2">
      ${c.thumb?`<img src="${esc(c.thumb)}" class="w-8 h-8 rounded-full shrink-0">`:`<div class="w-8 h-8 rounded-full bg-stone-100 shrink-0"></div>`}
      <div class="min-w-0 flex-1"><div class="text-[12px] font-bold truncate">${esc(c.name||c.url)}</div>
      ${c.subs?`<div class="text-[10px] text-stone-500 mono inline-flex items-center gap-1">登録 ${fmtNum(c.subs)}${c.videos?` ・${fmtNum(c.videos)}本`:""}</div>`:""}
      ${c.note?`<div class="text-[10px] text-stone-400 truncate">${esc(c.note)}</div>`:""}</div>
      ${c.url?`<a href="${safeUrl(c.url)}" target="_blank" rel="noreferrer" class="text-[10px] text-stone-400 shrink-0">↗</a>`:""}
    </div>`).join("")}</div>

function render(){
  const p = SNAP.project;
  const theme = p.theme || {main:"#1F2430",accent:"#E63946"};
  const accent = theme.accent, main = theme.main;
  const m = p.meta||{};
  const titles = (m.titles||[]).filter(Boolean);
  document.documentElement.style.setProperty("--main", main);
  document.documentElement.style.setProperty("--accent", accent);

  const ci = p.channelInfo;
  const hasConcept = !!(ci && (ci.name||ci.url||ci.concept||ci.target||ci.purpose||(ci.competitors||[]).length));
  const hasPlans = (p.plans||[]).length > 0;
  const tabs = [];
  const isTalk = p.format === "talk";
  if(hasConcept) tabs.push(["concept","チャンネルコンセプト"]);
  if(hasPlans) tabs.push(["plan","企画・サムネ"]);
  const hasHearing = !isTalk && (p.hearing||[]).some(s=>(s.items||[]).some(it=>(it.value||"").trim()));
  if(hasHearing) tabs.push(["hearing","ヒアリング"]);
  const hasScript = isTalk ? !!(p.talk && ((p.talk.body||[]).some(b=>b.script||b.heading) || p.talk.intro || p.talk.highlight)) : (p.rows||[]).length > 0;
  if(hasScript) tabs.push(["script","構成台本"]);
  if(!isTalk && (p.rows||[]).length) tabs.push(["kouban","香盤表"]);
  // 動画タブ：動画があれば「確認」、編集者URL(UP_TOKEN)なら動画ゼロでも常時表示してアップ枠を出す。
  // 案件まるごと共有（タブ絞り無し）でも常に出す＝「全タブ」を欠けさせない
  const fullCase = !ALLOW_TABS.length && !LOCK_TAB;
  if(videoOptions(p).length || UP_TOKEN || fullCase) tabs.push(["video", videoOptions(p).length ? "動画確認" : "動画アップ"]);
  const hasFilesAny = (p.files||[]).length || (p.plans||[]).some(pl=>(pl.files||[]).length) || (UPLOADS||[]).length || (p.assets||[]).some(a=>a&&a.key&&a.type!=="youtube");
  if(hasFilesAny || hasScript || videoOptions(p).length) tabs.push(["files","ファイル"]);
  const manualCount = ((p.manuals||[]).length) + (((p.channelInfo&&p.channelInfo.manuals)||[]).length) + ((p.manualsGlobal||[]).length);
  if(manualCount) tabs.push(["manual","マニュアル"]);
  // 複数タブ束ね共有：許可タブだけに絞る（タブバーは出す＝相手は許可タブ内で切替できる）
  if(ALLOW_TABS.length){
    // 編集者URL(UP_TOKEN)なら、旧プリセットでtabsにvideoが無くても動画タブは必ず通す（アップ入口を消さない）
    const allowed = tabs.filter(t=>ALLOW_TABS.includes(t[0]) || (UP_TOKEN && t[0]==="video"));
    if(allowed.length){ tabs.length=0; tabs.push(...allowed); }
  }
  // 単一タブ共有：指定ペインだけ表示。タブバーは隠す
  const lockedTab = (LOCK_TAB && tabs.some(t=>t[0]===LOCK_TAB)) ? LOCK_TAB : null;
  if(lockedTab) TAB = lockedTab;
  if(!tabs.some(t=>t[0]===TAB)) TAB = (tabs[0] && tabs[0][0]) || "script";

  const tabBar = lockedTab ? "" : `<div class="flex gap-1 mb-4 border-b border-stone-200 overflow-x-auto sticky top-0 z-30" style="background:#E9E8E3">${tabs.map(([k,label])=>
    `<button data-tab="${k}" class="tabbtn text-[12px] font-bold px-3 py-2 whitespace-nowrap ${TAB===k?'border-b-2':''}" style="${TAB===k?`color:${main};border-color:${accent}`:'color:#9ca3af'}">${label}</button>`).join("")}</div>`;

  const pane = TAB==="concept" ? paneConcept(p)
    : TAB==="plan" ? panePlans(p)
    : TAB==="hearing" ? paneHearing(p, accent, main)
    : TAB==="kouban" ? paneKouban(p)
    : TAB==="video" ? paneVideo(p, accent, main)
    : TAB==="files" ? paneFiles(p, accent, main)
    : TAB==="manual" ? paneManual(p, accent, main)
    : isTalk ? paneTalk(p, accent, main)
    : paneScript(p, accent, main);

  const appEl = document.getElementById("app");
  if(appEl) appEl.style.maxWidth = (TAB==="video") ? "1280px" : "820px";
  // 編集者URL専用：どのタブにいても右上から「動画を上げる」「確認URLをコピー」に届く固定バー
  const editorBar = (UP_TOKEN && !CHMODE) ? `
    <div class="fixed top-2 right-2 z-40 flex gap-1.5">
      <button id="eb-up" class="text-[11px] font-bold pl-2.5 pr-3 py-2 rounded-full shadow-md text-white flex items-center gap-1.5" style="background:${accent}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M12 17V4"/><path d="M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>動画を上げる</button>
      <button id="eb-link" class="text-[11px] font-bold pl-2.5 pr-3 py-2 rounded-full shadow-md bg-white border border-stone-200 text-stone-600 flex items-center gap-1.5">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>確認URLをコピー</button>
    </div>` : "";
  appEl.innerHTML = `
    ${editorBar}
    <div class="flex items-center justify-between mb-3">
      <div class="text-[11px] font-bold tracking-[0.2em] text-stone-400">ものがたりっち！</div>
      <div class="text-[11px] text-stone-400">${esc(p.channel||"")}</div>
    </div>
    ${tabBar}
    <div class="rounded-2xl overflow-hidden shadow-sm border border-stone-200 mb-5">
      <div class="px-5 py-4" style="background:${main};color:#fff">
        <div class="text-[18px] font-black leading-snug">${esc(titles[0]||p.name||"構成台本")}</div>
        ${TAB!=="video" && (m.shootDate||m.place) ? `<div class="mt-1 text-[12px] opacity-80 flex flex-wrap gap-x-4">
          ${m.shootDate?`<span>撮影日 ${esc(m.shootDate)}</span>`:""}
          ${m.place?`<span>場所 ${esc(m.place)}</span>`:""}
        </div>` : ""}
      </div>
      ${m.highlight&&TAB==="script"?`<div class="bg-white px-5 py-3 border-t border-stone-100">
        <div class="text-[10px] font-bold text-stone-400 mb-1">冒頭フック</div>
        <div class="script">${renderScript(accent, m.highlight)}</div></div>`:""}
    </div>
    <div>${pane}</div>
    <p class="text-center text-[11px] text-stone-400 mt-8 leading-relaxed">制作：ものがたりっち！</p>
  `;

  document.querySelectorAll(".tabbtn").forEach(b => b.addEventListener("click", () => setTab(b.dataset.tab)));
  document.querySelectorAll(".cbtn").forEach(b => b.addEventListener("click", () => toggleComments(b.dataset.c, b.dataset.l)));
  if(TAB==="video") mountVideo(p, accent, main);
  if(TAB==="files") mountFiles(p, accent, main);
  // 編集者バー配線：どのタブからでも動画タブへ飛んでアップ枠を目立たせる／upトークン抜きの閲覧URLを渡す
  const ebUp = document.getElementById("eb-up");
  if(ebUp) ebUp.addEventListener("click", () => {
    if(TAB!=="video") setTab("video");
    setTimeout(() => { const d = document.getElementById("vu-drop"); if(d){ d.scrollIntoView({behavior:"smooth", block:"center"}); d.style.boxShadow = "0 0 0 3px " + accent; setTimeout(() => { d.style.boxShadow = ""; }, 1600); } }, 150);
  });
  const ebLink = document.getElementById("eb-link");
  if(ebLink) ebLink.addEventListener("click", async () => {
    const u = new URL(location.href); u.searchParams.delete("up"); u.searchParams.delete("start");
    try { await navigator.clipboard.writeText(u.toString()); ebLink.lastChild.textContent = ""; ebLink.insertAdjacentText("beforeend", "コピーした"); setTimeout(() => render(), 1400); }
    catch(e) { prompt("このURLをコピーしてね", u.toString()); }
  });
}

function renderChannel(){
  const ch = CHANNEL; const ci = ch.channelInfo || {};
  const cases = ch.cases || [];
  const theme = (cases[0] && cases[0].theme) || {main:"#1F2430",accent:"#E63946"};
  const mainC = theme.main, accentC = theme.accent;
  document.documentElement.style.setProperty("--main", mainC);
  const caseTitle = (c,i) => (c.plans&&c.plans[0]&&c.plans[0].title)||c.name||('案件'+(i+1));
  const caseThumb = (c) => { const r=(c.plans||[]).map(p=>(p.refs||[]).find(x=>x&&x.vid)).find(Boolean); return r?`https://img.youtube.com/vi/${r.vid}/mqdefault.jpg`:null; };

  const editable = !!ch.editable;
  const canEdit = (c) => !!(editable && c && c.edit && c.edit.liveId && c.edit.editToken);
  const editBtn = (c, title, cls, style) => canEdit(c)
    ? `<button class="editbtn ${cls||""}" style="${style||""}" data-live="${esc(c.edit.liveId)}" data-token="${esc(c.edit.editToken)}" data-title="${esc(title||"")}" title="この案件をその場で編集">${icon("edit","w-3 h-3")}<span class="hidden sm:inline">編集</span></button>`

function chCleanup(){ if(ytTimer){ clearInterval(ytTimer); ytTimer=null; } ytPlayer=null; videoEl=null; }

/* 編集ボタン → ページ移動せず、同ページ内にエディタ（live編集）をオーバーレイで開く */
function wireEditBtns(){
  document.querySelectorAll(".editbtn").forEach(b=>b.addEventListener("click",(e)=>{
    e.stopPropagation(); e.preventDefault();
    openEditor(b.dataset.live, b.dataset.token, b.dataset.title);
  }));
}
function openEditor(liveId, token, title){
  if(!liveId || !token) return;
  if(document.getElementById("editor-overlay")) return;
  const ov = document.createElement("div");
  ov.id = "editor-overlay";
  ov.style.cssText = "position:fixed;inset:0;z-index:9999;background:#E9E8E3;display:flex;flex-direction:column";
  ov.innerHTML =
    `<div style="flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--main);color:#fff">
      <button id="ed-close" style="font-size:13px;font-weight:700;background:rgba(255,255,255,.18);border:0;color:#fff;border-radius:999px;padding:6px 14px 6px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,.15)">${icon("back","w-3.5 h-3.5")}一覧へ戻る</button>
      <div style="font-size:13px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(title||"編集")}</div>
      <div style="margin-left:auto;font-size:11px;opacity:.85;display:inline-flex;align-items:center;gap:5px">${icon("edit","w-3 h-3")}編集中・変更は自動保存</div>
    </div>
    <iframe src="index.html?live=${encodeURIComponent(liveId)}#k=${encodeURIComponent(token)}" style="flex:1 1 auto;border:0;width:100%;background:#E9E8E3" allow="clipboard-write"></iframe>`;
  document.body.appendChild(ov);
  document.body.style.overflow = "hidden";

}
function closeEditor(){
  const ov = document.getElementById("editor-overlay");
  if(ov) ov.remove();
  document.body.style.overflow = "";
  load(); // 最新スナップショットで再読込（編集結果を一覧へ反映）
}

function fmtTime(iso){ return (iso||"").slice(5,16).replace("T"," "); }

function toggleComments(sid, label){
  const wrap = document.getElementById("cwrap-"+sid);
  if(!wrap) return;
  if(!wrap.classList.contains("hidden")){ wrap.classList.add("hidden"); return; }
  wrap.classList.remove("hidden");
  renderCommentBox(sid, label);
}

function renderCommentBox(sid, label){
  const wrap = document.getElementById("cwrap-"+sid);
  const cs = commentsFor(sid);
  const listHtml = cs.length ? cs.map(c=>`
    <div class="rounded-lg border ${c.resolved?'bg-emerald-50 border-emerald-200':'bg-stone-50 border-stone-200'} px-3 py-2">
      <div class="flex items-center justify-between gap-2">
        <span class="text-[11px] font-bold text-stone-600">${esc(c.author||"ゲスト")}${c.resolved?' <span class="text-emerald-600">✓対応済</span>':''}</span>
        <span class="flex items-center gap-1.5 shrink-0">
          <span class="text-[10px] text-stone-400">${fmtTime(c.createdAt)}</span>
          ${CAN_RESOLVE?`<button data-resolve="${c.id}" data-next="${c.resolved?0:1}" class="cresolve text-[10px] font-bold pl-2 pr-2.5 py-1 rounded-full shadow-sm inline-flex items-center gap-1 ${c.resolved?'bg-stone-200 text-stone-500':'text-white'}" ${c.resolved?'':'style="background:#10B981"'}>${icon(c.resolved?"undo":"check","w-2.5 h-2.5")}${c.resolved?'未対応に戻す':'対応済みにする'}</button>`:""}
        </span>
      </div>
      <div class="text-[12.5px] text-stone-800 whitespace-pre-wrap break-words mt-0.5">${esc(c.text)}</div>
    </div>`).join("") : '<div class="text-[11px] text-stone-400">まだコメントはありません。</div>';

  wrap.innerHTML = `
    <div class="space-y-1.5">${listHtml}</div>
    <div class="rounded-lg border border-stone-200 bg-white p-2">
      <input id="au-${sid}" value="${esc(AUTHOR)}" placeholder="お名前（任意）" class="w-full text-[12px] px-2 py-1.5 mb-1.5 bg-stone-50 rounded focus:outline-none">
      <textarea id="tx-${sid}" rows="2" placeholder="このシーンへのコメント・修正依頼…" class="w-full text-[13px] px-2 py-1.5 border border-stone-200 rounded focus:outline-none resize-y"></textarea>
      <div class="flex justify-end mt-1.5">
        <button id="sb-${sid}" class="text-[11px] font-bold text-white pl-3 pr-4 py-1.5 rounded-full shadow-md inline-flex items-center gap-1.5" style="background:var(--main)">${icon("send","w-3 h-3")}送信</button>
      </div>
    </div>`;
  wrap.querySelector("#sb-"+sid).addEventListener("click", () => postComment(sid, label));
  wrap.querySelectorAll(".cresolve").forEach(b=>b.addEventListener("click", () => toggleResolved(b.dataset.resolve, b.dataset.next==="1", ()=>renderCommentBox(sid, label))));
}

/* 対応済み切替（アップロードトークン保持者=先方の編集者、または管理トークン保持者が可） */
async function toggleResolved(cid, next, onDone){
  try{
    const r = await fetch(API+"/api/snap/"+ID+"/comments/"+cid, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ resolved: next, up: UP_TOKEN })
    });
    const d = await r.json();
    if(!d.comment) throw new Error(d.error||"更新失敗");
    const i=COMMENTS.findIndex(x=>x.id===cid); if(i>=0) COMMENTS[i]=Object.assign({},COMMENTS[i],d.comment);
    if(onDone) onDone();
  }catch(e){ alert("更新に失敗しました："+e.message); }
}

async function postComment(sid, label){
  const tx = document.getElementById("tx-"+sid);
  const au = document.getElementById("au-"+sid);
  const text = (tx.value||"").trim();
  if(!text){ tx.focus(); return; }
  AUTHOR = (au.value||"").trim();
  try{ localStorage.setItem("mg:shareAuthor", AUTHOR); }catch(e){}
  const btn = document.getElementById("sb-"+sid); btn.disabled=true; btn.textContent="送信中…";
  try{
    const r = await fetch(API+"/api/snap/"+ID+"/comments", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ sceneId: sid, sceneLabel: label, author: AUTHOR||"ゲスト", text })
    });
    const d = await r.json();
    if(d.comment){ COMMENTS.push(d.comment); render(); toggleComments(sid, label); }
    else throw new Error(d.error||"送信失敗");
  }catch(e){
    btn.disabled=false; btn.textContent="送信";
    alert("送信に失敗しました：" + e.message);
  }
}

/* ───────── 動画確認タブ（Frame.io風） ───────── */
function fmtTC(s){ s=Math.max(0,+s||0); const m=Math.floor(s/60), sec=Math.floor(s%60), cs=Math.floor((s*100)%100); return `${m}:${String(sec).padStart(2,"0")}.${String(cs).padStart(2,"0")}`; }
function ytId(u){ const m=(u||"").match(/(?:youtu\.be\/|[?&]v=|embed\/|shorts\/)([A-Za-z0-9_-]{11})/); return m?m[1]:""; }
function rateButtons(type){
  const rates = type==="youtube" ? [0.5,1,1.5,2] : [0.5,1,1.5,2,3,4];
  return rates.map(r=>`<button data-rate="${r}" class="vc-rate text-[11px] mono px-2.5 py-1 rounded-full border border-stone-200 ${r===1?'bg-stone-100':'bg-white'}">${r}x</button>`).join("");
}
/* 動画の選択肢（案件全体＋企画ごと） */
function vidKey(v){ return v ? (v.uid || v.key || v.url || "") : ""; }
function videoOptions(p){
  const out=[];
  // 確認用バージョン（v1/v2/v3）。Stream変換済み(hls)を優先表示
  const vers = (p.review && Array.isArray(p.review.versions)) ? p.review.versions : [];
  vers.forEach((v)=>{ if(v.trashedAt) return; /* ゴミ箱入りの版は先方に見せない */ if(v.uid || v.url || v.key) out.push({ id: v.uid || v.key || v.url, label: v.label + (v.name && v.name!==v.label ? " "+v.name : ""), video: { type: v.type, key: v.key, url: v.url, uid: v.uid, hls: v.hls, ready: v.ready } }); });
  if(p.video && (p.video.url||p.video.key)) out.push({ id: vidKey(p.video), label:"案件全体", video:p.video });
  (p.plans||[]).forEach((pl,i)=>{ if(pl.video && (pl.video.url||pl.video.key)) out.push({ id: vidKey(pl.video), label:(pl.title||("企画"+(i+1))).slice(0,24), video:pl.video }); });
  // 編集者が共有リンクから上げた動画（role:review もしくは動画mime/拡張子）も確認対象に合流。AKの取り込み待ちなく即見える。
  const isVid = (u)=> u && u.key && (u.role==="review" || /^video\//.test(u.mime||"") || /\.(mp4|mov|m4v|webm)$/i.test(u.name||""));
  (UPLOADS||[]).filter(isVid).forEach((u)=>{ const id="up:"+u.key; if(out.some(o=>o.id===id)) return; out.push({ id, label:"編集者アップ"+(u.name?"："+u.name.slice(0,20):""), up:true, video:{ type:"r2", key:u.key } }); });
  return out;
}
// 最新の確認用バージョンID（vers配列の末尾＝一番新しい修正版）。旧版を誤って確認するミス防止。
function newestVerId(p){ const vers=(p.review&&Array.isArray(p.review.versions))?p.review.versions:[]; for(let i=vers.length-1;i>=0;i--){ const v=vers[i]; if(v.trashedAt) continue; const id=v.uid||v.key||v.url; if(id) return id; } return null; }
function curVideo(p){ const opts=videoOptions(p); if(!opts.length) return null; if(VSEL){ const f=opts.find(o=>o.id===VSEL); if(f) return f; } const nv=newestVerId(p); return (nv&&opts.find(o=>o.id===nv)) || opts[0]; }
function selectVideo(id){ if(ytTimer){ clearInterval(ytTimer); ytTimer=null; } ytPlayer=null; videoEl=null; VSEL=id; CHMODE?renderChannel():render(); }
/* 編集者URL用：完成動画アップ枠（mpuUpload を role:review で叩く） */
function videoUploadBox(accent, main, compact){
  return `<div id="vu-drop" class="rounded-xl border border-dashed border-stone-300 bg-stone-50 ${compact?'p-3':'p-5'} transition-colors text-center">
      <div class="text-[13px] font-bold text-stone-600 mb-1">${compact?'別バージョンを上げる':'完成動画をアップロード'}</div>
      <div class="text-[11px] text-stone-400 mb-2">ここに<span class="font-bold">ドラッグ＆ドロップ</span>、または下から選択。上げると即この画面で確認できます（大容量OK）。</div>
      <input id="vu-input" type="file" accept="video/*" class="text-[12px] block mx-auto">
      <div id="vu-prog" class="hidden mt-2"><div class="h-1.5 bg-stone-200 rounded overflow-hidden"><div id="vu-bar" class="h-full" style="width:0%;background:${accent}"></div></div><div id="vu-pct" class="text-[10px] text-stone-400 mt-1">0%</div></div>
    </div>`;
}
function paneVideo(p, accent, main){
  const opts = videoOptions(p);
  // 動画ゼロ：編集者URLならアップ枠、それ以外（まるごと共有など）は案内を出す（空の黒プレーヤーを出さない）
  if(!opts.length){
    const box = (UP_TOKEN && !CHMODE)
      ? videoUploadBox(accent, main, false)
      : `<div class="rounded-xl border border-dashed border-stone-300 bg-stone-50 p-6 text-center text-[12px] text-stone-400 leading-relaxed">まだ動画はありません。<br>編集者用リンクから完成動画を上げると、ここで確認できます。</div>`;
    return `<div class="max-w-[560px] mx-auto py-2">${box}</div>`;
  }
  const cur = curVideo(p); if(cur) VSEL = cur.id;
  const v = (cur&&cur.video)||{};
  const selector = opts.length>1 ? (()=>{
    // 既定は「今表示中の版」だけ見せて、過去の版・別動画はトグルの奥へ。ワンタップで旧版に切り替わって先祖返りするのを防ぐ。
    const pill = (o)=>`<button data-vsel="${esc(o.id)}" class="vc-sel text-[11px] font-bold px-2.5 py-1 rounded-full border ${o.id===VSEL?'text-white':'text-stone-500 border-stone-200'}" style="${o.id===VSEL?`background:${main};border-color:${main}`:''}">${esc(o.label)}</button>`;
    const curOpt = opts.find(o=>o.id===VSEL) || opts[opts.length-1];
    const others = opts.filter(o=>o!==curOpt);
    return `<div class="flex gap-1 flex-wrap items-center mb-1">${pill(curOpt)}<button id="vc-vmore" class="text-[11px] font-bold px-2.5 py-1 rounded-full border border-dashed border-stone-300 text-stone-400 hover:bg-stone-50">${VLIST_OPEN?'× 閉じる':'他のバージョン '+others.length+' ▾'}</button>${VLIST_OPEN?others.map(pill).join(""):""}</div>${VLIST_OPEN?"":`<div class="text-[10px] text-stone-400 mb-2">最新版を表示中。過去の版や別の動画は「他のバージョン」から選べます。</div>`}`;
  })() : "";
  return `
    <div class="lg:flex lg:gap-4 lg:items-start">
      <div class="lg:flex-[1.7] min-w-0">
        ${selector}
        ${v.title?`<div class="text-[14px] font-bold mb-2" style="color:${main}">${esc(v.title)}</div>`:""}

let _vcKeyBound=false;
function vcTogglePlay(){
  if(videoEl){ if(videoEl.paused){ const p=videoEl.play(); if(p&&p.catch)p.catch(()=>{}); } else videoEl.pause(); }
  else if(ytPlayer){ const st=ytPlayer.getPlayerState&&ytPlayer.getPlayerState(); if(st===1){ ytPlayer.pauseVideo&&ytPlayer.pauseVideo(); } else { ytPlayer.playVideo&&ytPlayer.playVideo(); } }
}
function vcFmt(s){ s=Math.max(0,s||0); if(!isFinite(s))s=0; const m=Math.floor(s/60), ss=Math.floor(s%60); return m+":"+String(ss).padStart(2,"0"); }
/* 共有ビューアの自前プレーヤー制御：映像に被るネイティブバーを撤去し、外部シークバー＋スペース=再生停止＋←→シーク */
function wireVideoControls(){
  const bar=document.getElementById("vc-bar"), seek=document.getElementById("vc-seek"), pp=document.getElementById("vc-pp"), cur=document.getElementById("vc-cur");
  if(!videoEl){ if(bar) bar.style.display="none"; return; }
  if(bar) bar.style.display="flex";
  videoEl.style.cursor="pointer";
  videoEl.addEventListener("click", vcTogglePlay);
  videoEl.addEventListener("play", ()=>{ if(pp) pp.innerHTML=icon("pause","w-3.5 h-3.5"); });
  videoEl.addEventListener("pause", ()=>{ if(pp) pp.innerHTML=icon("play","w-3.5 h-3.5"); });
  videoEl.addEventListener("loadedmetadata", ()=>{ if(seek&&isFinite(videoEl.duration)) seek.max=videoEl.duration; });
  videoEl.addEventListener("timeupdate", ()=>{ if(seek&&!seek._drag&&isFinite(videoEl.duration)){ seek.max=videoEl.duration; seek.value=videoEl.currentTime; } if(cur) cur.textContent=vcFmt(videoEl.currentTime)+" / "+vcFmt(videoEl.duration); });
  if(seek){ seek.addEventListener("input", ()=>{ seek._drag=true; if(videoEl) videoEl.currentTime=+seek.value; }); seek.addEventListener("change", ()=>{ seek._drag=false; }); }
  if(pp) pp.addEventListener("click", vcTogglePlay);
  wireSeekPreview();
  if(!_vcKeyBound){ _vcKeyBound=true; document.addEventListener("keydown", (e)=>{
    const t=e.target; if(t && (t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable)) return;
    if(e.key===" "||e.key==="Spacebar"||e.key==="Enter"){ if(!videoEl&&!ytPlayer) return; e.preventDefault(); vcTogglePlay(); }
    else if((e.key==="ArrowLeft"||e.key==="ArrowRight")&&videoEl){ e.preventDefault(); const d=(e.key==="ArrowRight"?1:-1)*(e.shiftKey?1:5); videoEl.currentTime=Math.max(0,Math.min(videoEl.duration||1e9,(videoEl.currentTime||0)+d)); }
  }); }
}
/* シークバーのホバープレビュー（YouTube風）。Stream変換済みは公式サムネAPI（?time=Ns）で
   カーソル位置のシーンを出す。それ以外（生mp4/変換中）はタイムコードだけの吹き出し。 */
function wireSeekPreview(){
  const sk=document.getElementById("vc-seek"); if(!sk || sk._pvWired) return; sk._pvWired=true;
  const wrap=sk.parentElement; if(!wrap) return; wrap.style.position="relative";
  const cv=curVideo(SNAP.project||{}); const v=(cv&&cv.video)||{};
  const thumbBase=(v.type==="stream"&&v.ready&&v.hls)?v.hls.replace(/manifest\/video\.m3u8.*$/,"thumbnails/thumbnail.jpg"):"";
  const tip=document.createElement("div");
  tip.style.cssText="position:absolute;bottom:20px;transform:translateX(-50%);z-index:30;pointer-events:none;display:none;border-radius:10px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.35);background:#000;border:1px solid rgba(0,0,0,.25)";
  tip.innerHTML=(thumbBase?`<img style="display:block;width:160px;height:90px;object-fit:cover" alt="">`:"")
    +`<div class="pv-t" style="text-align:center;font-size:10px;font-weight:bold;color:rgba(255,255,255,.92);padding:2px 8px;background:rgba(0,0,0,.85);font-family:ui-monospace,monospace"></div>`;
  wrap.appendChild(tip);
  const img=tip.querySelector("img"), tt=tip.querySelector(".pv-t");
  let lastSec=-1;
  sk.addEventListener("mousemove",(e)=>{
    const d=(videoEl&&isFinite(videoEl.duration)&&videoEl.duration)||0;
    if(!d){ tip.style.display="none"; return; }
    const r=sk.getBoundingClientRect();
    const frac=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)), t=frac*d;
    tip.style.left=Math.min(r.width-84,Math.max(84,e.clientX-r.left))+"px";
    tip.style.display="block";
    tt.textContent=fmtTC(t);
    if(img){ const s=Math.max(0,Math.floor(t)); if(s!==lastSec){ lastSec=s;
      const u=thumbBase+"?time="+s+"s&height=90";
      const im=new Image(); im.onload=()=>{ img.src=u; }; im.src=u;  // 読み込み完了後に差し替え＝チラつき防止
    } }
  });
  sk.addEventListener("mouseleave",()=>{ tip.style.display="none"; });
}

// 先祖返り検知：いまボードにある最新版がアップされた時刻。新ファイルがこれより古ければ「古い書き出し」の疑い。
function latestBoardTs(p){
  let mx=0;
  const push=(s)=>{ const t=s?Date.parse(s):NaN; if(!isNaN(t)&&t>mx) mx=t; };
  const vers=(p&&p.review&&Array.isArray(p.review.versions))?p.review.versions:[];
  vers.forEach(v=>push(v.createdAt));
  (UPLOADS||[]).forEach(u=>push(u.uploadedAt));
  return mx;
}
async function videoUpload(file, p, accent, main){
  // ファイル更新日時がボード最新版より前＝古い書き出しを上げようとしている可能性（先祖返り）。上げる前に一声かける。
  const lm = file && file.lastModified ? file.lastModified : 0;
  const latest = latestBoardTs(p);
  if(lm && latest && lm < latest - 60000){
    const f=(ms)=>{ try{ return new Date(ms).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}); }catch(_){ return ""; } };
    const ok = window.confirm("⚠️ このファイルの更新日時（"+f(lm)+"）は、いまボードにある最新版がアップされた時刻（"+f(latest)+"）より前です。\n\n古い書き出しを上げようとしていないか（先祖返り）確認してください。\n\nこのままアップしますか？");
    if(!ok) return;
  }
  const prog=document.getElementById("vu-prog"), bar=document.getElementById("vu-bar"), pct=document.getElementById("vu-pct");
  if(prog) prog.classList.remove("hidden");
  if(bar) bar.style.background=accent; if(pct){ pct.style.color="#9ca3af"; pct.textContent="アップロード準備中…（大きい動画は時間がかかります）"; }

    const meta = await mpuUpload(file, { planId: target==="project"?"":target, role:"review", retention: 0 }, (v)=>{ if(bar){ bar.style.width=v+"%"; } if(pct) pct.textContent="アップロード中 "+v+"%（このまま閉じないでね）"; });
    UPLOADS.push(meta);
    VSEL = "up:"+meta.key;   // 上げたばかりの動画を選択
    if(ytTimer){ clearInterval(ytTimer); ytTimer=null; } ytPlayer=null; videoEl=null;
    render();
  }catch(e){ if(pct){ pct.style.color="#DC2645"; pct.textContent="⚠ 送信できませんでした："+(e.message||e); } if(bar){ bar.style.background="#DC2645"; } alert("動画アップに失敗しました："+e.message); }

    </div>`;}).join("") : '<div class="text-[11px] text-stone-400 text-center py-4">まだコメントはありません。</div>';
  el.querySelectorAll(".vc-seek").forEach(b=>b.addEventListener("click", ()=>seekTo(+b.dataset.seek)));
  el.querySelectorAll(".vc-repbtn").forEach(b=>b.addEventListener("click", ()=>postReply(b.dataset.repbtn, accent, main)));
  el.querySelectorAll(".vc-rep").forEach(i=>i.addEventListener("keydown", e=>{ if(e.key!=="Enter"||e.shiftKey||e.isComposing||e.keyCode===229) return; e.preventDefault(); postReply(i.dataset.rep, accent, main); }));
  el.querySelectorAll(".vc-del").forEach(b=>b.addEventListener("click", ()=>deleteOwn(b.dataset.del, accent, main)));
  el.querySelectorAll(".vc-resolve").forEach(b=>b.addEventListener("click", ()=>toggleResolved(b.dataset.resolve, b.dataset.next==="1", ()=>renderVideoList(accent, main))));
}
async function deleteOwn(cid, accent, main){
  if(!confirm("このコメントを削除しますか？")) return;
  try{
    await fetch(API+"/api/snap/"+ID+"/comments/"+cid+"?own=1", { method:"DELETE" });
    const i=COMMENTS.findIndex(x=>x.id===cid); if(i>=0) COMMENTS.splice(i,1);
    renderVideoList(accent, main);
  }catch(e){ alert("削除に失敗しました"); }
}
async function postReply(cid, accent, main){
  const inp=document.querySelector('.vc-rep[data-rep="'+cid+'"]'); if(!inp) return;
  const text=(inp.value||"").trim(); if(!text) return;
  const author=(AUTHOR||"").trim()||"ゲスト";
  try{
    const r=await fetch(API+"/api/snap/"+ID+"/comments/"+cid, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ reply:{author,text} }) });
    const d=await r.json();
    if(d.comment){ const i=COMMENTS.findIndex(x=>x.id===cid); if(i>=0) COMMENTS[i]=Object.assign({},COMMENTS[i],{replies:d.comment.replies}); renderVideoList(accent, main); }
  }catch(e){ alert("返信に失敗しました"); }
}
function openVideoForm(accent, main){

      <input id="vc-au" value="${esc(AUTHOR)}" placeholder="お名前（任意）" class="w-full text-[12px] px-2 py-1.5 mb-1.5 bg-stone-50 rounded focus:outline-none">
      <div class="flex gap-2 mb-1.5">
        <select id="vc-cat" class="text-[11px] border border-stone-200 rounded px-1.5 py-1">${CMT_CATS.map(c=>`<option>${c}</option>`).join("")}</select>
        <select id="vc-prio" class="text-[11px] border border-stone-200 rounded px-1.5 py-1"><option value="高">優先:高</option><option value="中" selected>優先:中</option><option value="低">優先:低</option></select>
      </div>
      <textarea id="vc-tx" rows="2" placeholder="修正依頼・気になる点…" class="w-full text-[13px] px-2 py-1.5 border border-stone-200 rounded focus:outline-none resize-y"></textarea>
      <div class="flex justify-end gap-2 mt-1.5">

      </div>

  const tx=document.getElementById("vc-tx"); if(tx){ tx.focus(); tx.addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){ e.preventDefault(); postVideoComment(sec, accent, main); } }); }
  document.getElementById("vc-cancel").addEventListener("click", ()=>{ f.classList.add("hidden"); f.innerHTML=""; });

async function postVideoComment(sec, accent, main){
  const tx=document.getElementById("vc-tx"), au=document.getElementById("vc-au");
  const text=(tx.value||"").trim(); if(!text){ tx.focus(); return; }
  AUTHOR=(au.value||"").trim(); try{ localStorage.setItem("mg:shareAuthor", AUTHOR); }catch(e){}
  const cat=(document.getElementById("vc-cat")||{}).value||"その他";
  const prio=(document.getElementById("vc-prio")||{}).value||"中";
  const btn=document.getElementById("vc-send"); btn.disabled=true; btn.textContent="送信中…";
  try{
    const r=await fetch(API+"/api/snap/"+ID+"/comments", { method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ timecode:sec, videoKey:(VSEL||""), author:AUTHOR||"ゲスト", text, category:cat, priority:prio, status:"未対応" }) });
    const d=await r.json();
    if(d.comment){ markMine(d.comment.id); COMMENTS.push(d.comment); const f=document.getElementById("vc-form"); f.classList.add("hidden"); f.innerHTML=""; renderVideoList(accent, main); }
    else throw new Error(d.error||"送信失敗");
  }catch(e){ btn.disabled=false; btn.textContent="送信"; alert("送信に失敗しました："+e.message); }
}

/* ───────── ファイル転送タブ（DL＋先方アップ） ───────── */
function fmtBytes(n){ n=+n||0; if(n>=1073741824) return (n/1073741824).toFixed(2)+" GB"; if(n>=1048576) return (n/1048576).toFixed(1)+" MB"; if(n>=1024) return (n/1024).toFixed(0)+" KB"; return n+" B"; }
/* 企画別ファイルグループ（案件全体＋各企画。owner＝p.files/pl.files、guest＝UPLOADSをplanIdで振り分け） */
function fileGroups(p){
  const upBy = (pid)=> (UPLOADS||[]).filter(u=> (u.planId||"")===pid );
  // 素材管理(project.assets)のファイルも共有でDLできるように取り込む（key有り・YouTube以外）
  const asBy = (pid)=> (p.assets||[]).filter(a=> a && a.key && a.type!=="youtube" && (a.planId||"")===pid ).map(a=>({ key:a.key, name:a.name, size:a.size, by:"owner" }));
  const dedup = (arr)=>{ const seen=new Set(); return arr.filter(f=>{ const k=f.key||f.name; if(seen.has(k)) return false; seen.add(k); return true; }); };
  const groups=[{ id:"project", label:"案件全体", files:dedup((p.files||[]).map(f=>({...f,by:"owner"})).concat(asBy("")).concat(upBy("").map(f=>({...f,by:"guest"})))) }];
  (p.plans||[]).forEach((pl,i)=>{
    const files=dedup(((pl.files||[]).map(f=>({...f,by:"owner"}))).concat(asBy(pl.id)).concat(upBy(pl.id).map(f=>({...f,by:"guest"}))));
    if(files.length) groups.push({ id:pl.id, label:(pl.title||("企画"+(i+1))), files });
  });
  return groups;
}
function paneFiles(p, accent, main){
  const plans=(p.plans||[]);
  const targetSel = plans.length ? `<select id="fl-target" class="text-[12px] border border-stone-200 rounded px-2 py-1 mb-2 block">
      <option value="project">案件全体に送る</option>
      ${plans.map((pl,i)=>`<option value="${esc(pl.id)}">${esc((pl.title||("企画"+(i+1))).slice(0,20))} に送る</option>`).join("")}
    </select>` : "";
  return `
    <div>
      <div id="fl-list"></div>
      ${CHMODE?"":`<div id="fl-drop" class="rounded-xl border border-dashed border-stone-300 bg-stone-50 p-4 mt-3 transition-colors">
        <div class="text-[12px] font-bold text-stone-600 mb-1">ファイルを送る</div>
        <div class="text-[11px] text-stone-400 mb-2">ここに<span class="font-bold">ドラッグ＆ドロップ</span>、または下から選択（${UP_TOKEN?"大容量OK":"1ファイル2GBまで"}・複数可）。</div>
        ${targetSel}
        <input id="fl-input" type="file" multiple class="text-[12px] block">
        <div id="fl-prog" class="hidden mt-2"><div class="h-1.5 bg-stone-200 rounded overflow-hidden"><div id="fl-bar" class="h-full" style="width:0%;background:${accent}"></div></div><div id="fl-pct" class="text-[10px] text-stone-400 mt-1">0%</div></div>
      </div>`}
    </div>`;
}
async function guestUploadMany(files, p, accent, main){ for(const f of (files||[])){ await guestUpload(f, p, accent, main); } }
function mountFiles(p, accent, main){
  renderFileList(p, accent, main);
  const inp=document.getElementById("fl-input");
  if(inp) inp.addEventListener("change", ()=>{ const fs=Array.from(inp.files||[]); if(fs.length) guestUploadMany(fs, p, accent, main); });
  const drop=document.getElementById("fl-drop");
  if(drop){
    drop.addEventListener("dragover", (e)=>{ e.preventDefault(); drop.style.background="#f5f3ff"; drop.style.borderColor=accent; });
    drop.addEventListener("dragleave", (e)=>{ if(e.target===drop){ drop.style.background=""; drop.style.borderColor=""; } });
    drop.addEventListener("drop", (e)=>{ e.preventDefault(); drop.style.background=""; drop.style.borderColor=""; const fs=Array.from((e.dataTransfer&&e.dataTransfer.files)||[]); if(fs.length) guestUploadMany(fs, p, accent, main); });
  }
}
function renderFileList(p, accent, main){
  const el=document.getElementById("fl-list"); if(!el) return;
  const groups=fileGroups(p).filter(g=>g.files.length);
  if(!groups.length){ el.innerHTML='<div class="text-[11px] text-stone-400 text-center py-4">まだファイルはありません。</div>'; return; }
  const single = groups.length===1 && groups[0].id==="project";
  el.innerHTML = groups.map(g=>`
    <div class="mb-3">
      ${single?"":`<div class="text-[11px] font-bold text-stone-500 mb-1">${esc(g.label)}</div>`}
      ${g.files.map(f=>`<div class="flex items-center gap-3 rounded-lg border border-stone-200 bg-white px-3 py-2 mb-1.5">
        <div class="flex-1 min-w-0">
          <div class="text-[13px] font-semibold text-stone-800 truncate">${esc(f.name||"file")}</div>
          <div class="text-[10px] text-stone-400 mono">${fmtBytes(f.size)}${f.by==="guest"?" ・先方アップ":""}${f.expiresAt?` ・${fmtTime(f.expiresAt)}まで`:""}</div>
        </div>
        <a href="${API}/api/file/${f.key}?dl=1" class="text-[11px] font-bold text-white pl-2.5 pr-3 py-1.5 rounded-full shadow-md shrink-0 inline-flex items-center gap-1.5" style="background:${main}">${icon("download","w-3 h-3")}DL</a>
      </div>`).join("")}
    </div>`).join("");
}
/* たてがた君（縦ショート自動生成）結果表示。存在しなければ何も出さない（新規UI面積を増やさない） */
function renderShorts(d){
  const el=document.getElementById("vc-shorts"); if(!el) return;
  const shorts=(d&&d.shorts)||[], jobs=(d&&d.jobs)||[];
  const running = jobs.some(j=>j.status==="pending"||j.status==="processing");
  const errored = jobs.some(j=>j.status==="error");
  if(!shorts.length && !running && !errored){ el.innerHTML=""; return; }
  el.innerHTML = `<div class="mt-4 rounded-xl border border-stone-200 bg-white p-3">
    <div class="text-[12px] font-bold text-stone-500 mb-2">縦ショート（たてがた君 自動生成）</div>
    ${running?'<div class="text-[11px] text-stone-400 mb-1.5">⏳ 生成中…（数分かかることがあります）</div>':''}
    ${errored?'<div class="text-[11px] text-rose-500 mb-1.5">⚠️ 生成に失敗した回があります</div>':''}
    ${shorts.length?`<div class="flex flex-wrap gap-2">${shorts.map(f=>`
      <a href="${API}/api/file/${f.key}?dl=1" class="text-[11px] font-bold pl-2.5 pr-3 py-1.5 rounded-full shadow-sm bg-white border border-stone-200 text-stone-600 hover:bg-stone-50 inline-flex items-center gap-1.5">${icon("film","w-3 h-3")}${esc(f.name||"short.mp4")}</a>
    `).join("")}</div>`:''}
  </div>`;
}
function mountShorts(p, accent, main){
  const host=document.getElementById("vc-shorts");
  if(!host || CHMODE || !ID) return;
  let n=0;
  const poll = async ()=>{
    if(document.getElementById("vc-shorts")!==host) return;
    try{
      const d = await fetch(API+"/api/shorts/list/"+ID+RQ).then(r=>r.json());
      renderShorts(d);
      const running = d && Array.isArray(d.jobs) && d.jobs.some(j=>j.status==="pending"||j.status==="processing");
      if(!running || n++>20) return;
    }catch(e){ return; }
    setTimeout(poll, 8000);
  };
  poll();
}
/* ブラウザ→Worker→R2 のマルチパートアップロード（鍵不要）。onProg(0-100) */
async function mpuUpload(file, extra, onProg){
  const CHUNK = Math.min(90*1024*1024, Math.max(16*1024*1024, Math.ceil(file.size/9000)));
  const cr = await fetch(API+"/api/file/mpu/create", { method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({ snap:ID, name:file.name, size:file.size, mime:file.type||"application/octet-stream", up:UP_TOKEN }, extra||{})) });
  const cd = await cr.json(); if(!cd.uploadId) throw new Error(cd.error||"開始に失敗");
  const total = Math.max(1, Math.ceil(file.size/CHUNK));
  const parts = [];
  for(let i=0;i<total;i++){
    const start=i*CHUNK, blob=file.slice(start, Math.min(file.size, start+CHUNK));
    let etag=null, lastErr;
    // 回線が不安定でも粘る：1パートを最大6回まで再試行（指数バックオフ最大30秒）。
    // 途中まで上がったパートは parts に保持されるので、瞬断しても最初からやり直しにはならない。
    for(let attempt=0; attempt<6; attempt++){
      try{
        etag = await new Promise((res,rej)=>{ const xhr=new XMLHttpRequest();
          xhr.open("PUT", API+"/api/file/mpu/part?key="+encodeURIComponent(cd.key)+"&uploadId="+encodeURIComponent(cd.uploadId)+"&part="+(i+1));
          xhr.timeout = 180000; // 3分まったく進まなければストールとみなして再試行
          xhr.upload.onprogress=(e)=>{ if(e.lengthComputable&&onProg) onProg(Math.min(100, Math.round((start+e.loaded)/file.size*100))); };
          xhr.onload=()=>{ if(xhr.status>=200&&xhr.status<300){ try{ res(JSON.parse(xhr.responseText).etag); }catch(_){ rej(new Error("part応答不正")); } } else rej(new Error("part失敗("+xhr.status+")")); };
          xhr.onerror=()=>rej(new Error("通信エラー")); xhr.ontimeout=()=>rej(new Error("通信が止まりました（タイムアウト）")); xhr.send(blob); });
        break;
      }catch(e){ lastErr=e; if(attempt<5) await new Promise(r=>setTimeout(r, Math.min(30000, 2000*Math.pow(2,attempt)))); }
    }
    if(etag==null) throw lastErr||new Error("part失敗");
    parts.push({ partNumber:i+1, etag });
  }
  const fr = await fetch(API+"/api/file/mpu/complete", { method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({ snap:ID, key:cd.key, uploadId:cd.uploadId, parts, name:file.name, size:file.size, mime:file.type||"application/octet-stream", up:UP_TOKEN }, extra||{})) });
  const fd = await fr.json(); if(!fd.file) throw new Error(fd.error||"確定に失敗");
  return fd.file;
}
async function guestUpload(file, p, accent, main){
  const prog=document.getElementById("fl-prog"), bar=document.getElementById("fl-bar"), pct=document.getElementById("fl-pct");
  const selEl=document.getElementById("fl-target"); const target=selEl?selEl.value:"project";
  if(prog) prog.classList.remove("hidden");
  if(bar) bar.style.background=accent; if(pct){ pct.style.color="#9ca3af"; pct.textContent="アップロード準備中…"; }
  try{
    const meta = await mpuUpload(file, { planId: target==="project"?"":target }, (v)=>{ if(bar){ bar.style.width=v+"%"; } if(pct) pct.textContent="アップロード中 "+v+"%（このまま閉じないでね）"; });
    UPLOADS.push(meta);
    if(bar){ bar.style.width="100%"; } if(pct){ pct.style.color="#15803D"; pct.textContent="✓ 「"+(file.name||"ファイル")+"」を送信しました"; }
    const inp=document.getElementById("fl-input"); if(inp) inp.value="";
    renderFileList(p, accent, main);
    setTimeout(()=>{ if(prog) prog.classList.add("hidden"); if(bar){ bar.style.width="0%"; } if(pct){ pct.style.color="#9ca3af"; pct.textContent="0%"; } }, 4000);
  }catch(e){ if(bar){ bar.style.background="#DC2645"; } if(pct){ pct.style.color="#DC2645"; pct.textContent="⚠ 送信できませんでした："+(e.message||e); } alert("アップロードに失敗しました："+e.message); }
}
